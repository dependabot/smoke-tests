# Runs a single ecosystem and fills the cache.
name: Cache One

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      git-ref:
        description: git ref
        required: true
        default: main
      package_manager:
        description: The package manager to use
        required: true

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  cache_one:
    runs-on: ubuntu-latest
    name: Cache ${{ inputs.package_manager }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git-ref }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable

      - name: Install Dependabot CLI
        run: go install github.com/dependabot/cli/cmd/dependabot@latest

      # No download first to get a clean cache.

      - name: Smoke ${{ inputs.package_manager }}
        env:
          LOCAL_GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dependabot test -f=tests/smoke-${{ inputs.package_manager }}.yaml --cache=cache

      - uses: actions/upload-artifact@v6
        with:
          name: cache-${{ inputs.package_manager }}
          path: cache/
