# Runs all ecosystems cached and concurrently.
name: Smoke

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 * * * *"

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  suites:
    uses: ./.github/workflows/list-suites.yml

  filter:
    runs-on: ubuntu-latest
    needs: [suites]
    outputs:
      suites: ${{ steps.filter.outputs.suites }}
    steps:
      - name: Filter suites for PRs
        id: filter
        env:
          ALL_SUITES: ${{ needs.suites.outputs.suites }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "suites=$ALL_SUITES" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename')

          # If any non-test files changed, run all suites since those changes could affect any test
          NON_TEST=$(echo "$CHANGED_FILES" | grep -v '^tests/' || true)
          if [ -n "$NON_TEST" ]; then
            echo "suites=$ALL_SUITES" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Only test files changed — extract the suite names from the filenames
          SUITES=$(echo "$CHANGED_FILES" | grep '^tests/smoke-.*\.yaml$' | sed 's/^tests\/smoke-//' | sed 's/\.yaml$//' | jq -R | jq -sc)
          if [ "$SUITES" = "[]" ] || [ -z "$SUITES" ]; then
            echo "suites=$ALL_SUITES" >> "$GITHUB_OUTPUT"
          else
            echo "suites=$SUITES" >> "$GITHUB_OUTPUT"
          fi

  smoke:
    runs-on: ubuntu-latest
    needs: [filter]
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        suite: ${{ fromJSON(needs.filter.outputs.suites) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: stable

      - name: Install Dependabot CLI
        run: go install github.com/dependabot/cli/cmd/dependabot@latest

      # Download the Proxy cache. The job is ideally 100% cached so no real calls are made.
      - name: Download artifacts
        run: |
          set +e
          script/download-cache.sh ${{ matrix.suite }}
          # If the previous command failed, and this is a scheduled run, fail the job.
          if [ $? -ne 0 ] && [ "${{ github.event_name }}" == "schedule" ]; then
              exit 1
          fi

      - name: ${{ matrix.suite }}
        env:
          LOCAL_GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          dependabot test -f=tests/smoke-${{ matrix.suite }}.yaml -o=result.yaml --timeout 20m --cache=cache 2>&1 | tee -a log.txt

      - name: Diff
        if: always()
        continue-on-error: true
        run: diff --ignore-space-change tests/smoke-${{ matrix.suite}}.yaml result.yaml && echo "Contents are identical" || exit 0

      - name: Create summary
        run: tail -n100 log.txt | grep -P '\d+/\d+ calls cached \(\d+%\)' >> $GITHUB_STEP_SUMMARY

        # No upload at the end:
        # - If a test is uncachable in some regard, the cache would grow unbound.
        # - We might want to consider erroring if the cache is changed.
