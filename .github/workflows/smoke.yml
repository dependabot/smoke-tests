# Runs smoke tests: all on schedule/dispatch, only changed on PRs.
name: Smoke

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 * * * *"

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  suites:
    runs-on: ubuntu-latest
    outputs:
      suites: ${{ steps.suites.outputs.suites }}
      skip: ${{ steps.suites.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
      - name: Determine suites to run
        id: suites
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Only run tests that changed in the PR
            git fetch --no-tags --depth=1 origin ${{ github.event.pull_request.base.sha }}
            SUITES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD -- 'tests/smoke-*.yaml' | sed 's|^tests/smoke-||' | sed 's|\.yaml$||' | jq -R | jq -sc)
          else
            # Run all suites
            SUITES=$(ls tests/smoke-*.yaml | sed 's|^tests/smoke-||' | sed 's|\.yaml$||' | jq -R | jq -sc)
          fi

          if [ "$SUITES" = "[]" ] || [ -z "$SUITES" ]; then
            echo "suites=[]" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "suites=$SUITES" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  smoke:
    if: needs.suites.outputs.skip != 'true'
    runs-on: ubuntu-latest
    needs: [suites]
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        suite: ${{ fromJSON(needs.suites.outputs.suites) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: stable

      - name: Install Dependabot CLI
        run: go install github.com/dependabot/cli/cmd/dependabot@latest

      # Download the Proxy cache. The job is ideally 100% cached so no real calls are made.
      - name: Download artifacts
        run: |
          set +e
          script/download-cache.sh ${{ matrix.suite }}
          # If the previous command failed, and this is a scheduled run, fail the job.
          if [ $? -ne 0 ] && [ "${{ github.event_name }}" == "schedule" ]; then
              exit 1
          fi

      - name: ${{ matrix.suite }}
        env:
          LOCAL_GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          dependabot test -f=tests/smoke-${{ matrix.suite }}.yaml -o=result.yaml --timeout 20m --cache=cache 2>&1 | tee -a log.txt

      - name: Diff
        if: always()
        continue-on-error: true
        run: diff --ignore-space-change tests/smoke-${{ matrix.suite}}.yaml result.yaml && echo "Contents are identical" || exit 0

      - name: Create summary
        run: tail -n100 log.txt | grep -P '\d+/\d+ calls cached \(\d+%\)' >> $GITHUB_STEP_SUMMARY

        # No upload at the end:
        # - If a test is uncachable in some regard, the cache would grow unbound.
        # - We might want to consider erroring if the cache is changed.
