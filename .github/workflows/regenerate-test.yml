# Regenerates a single test file and creates a PR for review.
# Optionally specify a dependabot-core branch or PR number to use a custom updater
# image, enabling smoke test updates before merging core PRs.
# Use core-branch for internal branches, core-pr-number for contributor/fork PRs.
name: Regenerate Test

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      test:
        description: 'Test name to regenerate (e.g. npm, bundler, go, etc.)'
        required: true
        type: string
      core-branch:
        description: 'dependabot-core branch name (for internal branches)'
        required: false
        type: string
      core-pr-number:
        description: 'dependabot-core PR number (for contributor/fork PRs)'
        required: false
        type: number

permissions:
  contents: write
  packages: read
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  regenerate:
    runs-on: ubuntu-latest
    name: Regenerate ${{ inputs.test }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate test exists
        run: |
          TEST_FILE="tests/smoke-${{ inputs.test }}.yaml"
          if [ ! -f "$TEST_FILE" ]; then
            echo "Error: Test file $TEST_FILE does not exist"
            echo "Available tests:"
            ls tests/ | sed 's/^smoke-//' | sed 's/\.yaml$//'
            exit 1
          fi
          echo "Test file $TEST_FILE exists"

      - name: Download cache
        run: |
          script/download-cache.sh "${{ inputs.test }}" || echo "No cache found, proceeding without cache"

      - name: Download CLI
        run: |
          gh release download --repo dependabot/cli -p "*linux-amd64.tar.gz"
          tar xzvf *.tar.gz >/dev/null 2>&1
          chmod +x dependabot
          echo "$GITHUB_WORKSPACE" >> $GITHUB_PATH
          ./dependabot --version

      - name: Resolve updater image
        id: resolve_image
        if: inputs.core-branch != '' || inputs.core-pr-number != ''
        run: |
          # Map test names to ecosystem image suffixes
          declare -A ECOSYSTEM_MAP=(
            ["actions"]="github-actions"
            ["bundler"]="bundler"
            ["cargo"]="cargo"
            ["composer"]="composer"
            ["devcontainers"]="devcontainers"
            ["docker"]="docker"
            ["dotnet-sdk"]="dotnet-sdk"
            ["elm"]="elm"
            ["go"]="gomod"
            ["gradle"]="gradle"
            ["hex"]="mix"
            ["maven"]="maven"
            ["npm"]="npm"
            ["nuget"]="nuget"
            ["pub"]="pub"
            ["python"]="pip"
            ["rust-toolchain"]="rust-toolchain"
            ["submodules"]="gitsubmodule"
            ["swift"]="swift"
            ["terraform"]="terraform"
            ["vcpkg"]="vcpkg"
          )

          # Extract base test name (e.g. npm-group-rules -> npm, dotnet-sdk-security -> dotnet-sdk)
          TEST="${{ inputs.test }}"
          ECOSYSTEM=""
          for key in "${!ECOSYSTEM_MAP[@]}"; do
            if [[ "$TEST" == "$key" || "$TEST" == "$key"-* ]]; then
              if [ ${#key} -gt ${#ECOSYSTEM} ]; then
                ECOSYSTEM="${ECOSYSTEM_MAP[$key]}"
                MATCH="$key"
              fi
            fi
          done

          if [ -z "$ECOSYSTEM" ]; then
            echo "Error: Could not determine ecosystem for test '$TEST'"
            echo "Supported base test names: ${!ECOSYSTEM_MAP[*]}"
            exit 1
          fi
          echo "Matched test '$TEST' to ecosystem '$ECOSYSTEM' (via key '$MATCH')"

          # Resolve the PR number from either direct input or branch lookup
          if [ -n "${{ inputs.core-pr-number }}" ]; then
            PR_NUMBER="${{ inputs.core-pr-number }}"
            echo "Using PR #$PR_NUMBER directly"
            echo "source=pr:#$PR_NUMBER" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.core-branch }}" ]; then
            BRANCH="${{ inputs.core-branch }}"
            echo "Finding PR for branch '$BRANCH' in 'dependabot/dependabot-core'"
            PR_NUMBER=$(gh pr list --repo dependabot/dependabot-core --head "$BRANCH" --state open --json number --jq '.[0].number')
            if [ -z "$PR_NUMBER" ]; then
              echo "Error: No open PR found for branch '$BRANCH'. Images are only built for branches with open PRs."
              exit 1
            fi
            echo "Found PR #$PR_NUMBER for branch '$BRANCH'"
            echo "source=branch:$BRANCH (PR #$PR_NUMBER)" >> "$GITHUB_OUTPUT"
          fi

          # Get the merge commit SHA — this is what images-branch.yml uses to tag images
          # (github.sha for pull_request events = merge commit at refs/pull/N/merge)
          echo "Resolving merge commit SHA for PR #$PR_NUMBER"
          SHA=$(gh api "repos/dependabot/dependabot-core/git/ref/pull/$PR_NUMBER/merge" --jq .object.sha 2>/dev/null)
          if [ -z "$SHA" ]; then
            echo "Error: Could not resolve merge commit for PR #$PR_NUMBER. Is the PR mergeable?"
            exit 1
          fi
          echo "Resolved merge commit SHA: $SHA"

          IMAGE="ghcr.io/dependabot/dependabot-updater-${ECOSYSTEM}:${SHA}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Using updater image: $IMAGE"

      - name: Login to GHCR
        if: steps.resolve_image.outputs.image != ''
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate updater image exists
        if: steps.resolve_image.outputs.image != ''
        run: |
          echo "Pulling image: ${{ steps.resolve_image.outputs.image }}"
          if ! docker pull "${{ steps.resolve_image.outputs.image }}"; then
            echo "Error: Image ${{ steps.resolve_image.outputs.image }} not found."
            echo ""
            echo "This can happen if:"
            echo "  - The PR hasn't been approved yet (images-branch.yml requires approval)"
            echo "  - The images-branch.yml workflow hasn't finished building"
            echo "  - The branch was rebased and images-branch.yml needs to run again"
            exit 1
          fi
          echo "Image pulled successfully"

      - name: Regenerate test
        env:
          LOCAL_GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TEST_FILE="tests/smoke-${{ inputs.test }}.yaml"
          RESULT_FILE="result-${{ inputs.test }}.yaml"
          EXTRA_ARGS=""
          if [ -n "${{ steps.resolve_image.outputs.image }}" ]; then
            EXTRA_ARGS="--updater-image=${{ steps.resolve_image.outputs.image }}"
          fi
          dependabot test -f "$TEST_FILE" -o "$RESULT_FILE" --cache cache --timeout 20m $EXTRA_ARGS 2>&1 | tee -a regen.log

          # Validate the result has an output section (not wiped)
          if ! grep -q "^output:" "$RESULT_FILE"; then
            echo "Error: Regenerated file has no output section. The updater may have failed."
            echo "Last 50 lines of log:"
            tail -50 regen.log
            exit 1
          fi
          cp "$RESULT_FILE" "$TEST_FILE"

      - name: Check for changes
        id: check_changes
        run: |
          TEST_FILE="tests/smoke-${{ inputs.test }}.yaml"
          if git diff --quiet "$TEST_FILE"; then
            echo "Error: No changes were made to $TEST_FILE"
            echo "The test regeneration produced identical results"
            exit 1
          fi
          echo "Changes detected in $TEST_FILE"
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TEST_FILE="tests/smoke-${{ inputs.test }}.yaml"
          BRANCH_NAME="regenerate-test-${{ inputs.test }}-$(date +%s)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git add "$TEST_FILE"
          git commit -m "Regenerate ${{ inputs.test }} test"
          git push origin "$BRANCH_NAME"

          CORE_NOTE=""
          if [ -n "${{ inputs.core-branch }}" ]; then
            CORE_NOTE=$'\n**dependabot-core branch:** `${{ inputs.core-branch }}`'
            CORE_NOTE+=$'\n**Updater image:** `${{ steps.resolve_image.outputs.image }}`\n'
          elif [ -n "${{ inputs.core-pr-number }}" ]; then
            CORE_NOTE=$'\n**dependabot-core PR:** https://github.com/dependabot/dependabot-core/pull/${{ inputs.core-pr-number }}'
            CORE_NOTE+=$'\n**Updater image:** `${{ steps.resolve_image.outputs.image }}`\n'
          fi

          PR_BODY=$(cat <<EOF
          This PR regenerates the \`${{ inputs.test }}\` test file.

          **Test regenerated:** \`$TEST_FILE\`
          ${CORE_NOTE}
          The test was regenerated using \`dependabot test\` to update it with the latest dependency information.

          Please review the changes to ensure they are expected.
          EOF
          )

          gh pr create \
            --title "Regenerate ${{ inputs.test }} test" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH_NAME"
