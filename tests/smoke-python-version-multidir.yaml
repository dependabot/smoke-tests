input:
    job:
        command: update
        package-manager: pip
        allowed-updates:
            - dependency-type: direct
              update-type: all
        dependency-groups:
            - name: python_pkgs
              rules:
                patterns:
                    - urllib3
                    - numpy
                    - Flask
        ignore-conditions:
            - dependency-name: urllib3
              source: tests/smoke-python-version-multidir.yaml
              version-requirement: '>2.1.0'
            - dependency-name: numpy
              source: tests/smoke-python-version-multidir.yaml
              version-requirement: '>1.26.2'
            - dependency-name: flask
              source: tests/smoke-python-version-multidir.yaml
              version-requirement: '>3.0.2'
        source:
            provider: github
            repo: dependabot/smoke-tests
            directories:
                - /pip/multi-dir/foo
                - /pip/multi-dir/bar
            branch: main
            commit: 0962713db3cb346a729e68bc86706ac7372f9067
    credentials:
        - host: github.com
          password: $LOCAL_GITHUB_ACCESS_TOKEN
          type: git_source
          username: x-access-token
output:
    - type: update_dependency_list
      expect:
        data:
            dependencies:
                - name: urllib3
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.0
                      source: null
                  version: "1.0"
                - name: flask[async]
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==2.0.0
                      source: null
                  version: 2.0.0
                - name: urllib3[socks]
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.0
                      source: null
                  version: "1.0"
                - name: numpy
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.0
                      source: null
                  version: "1.0"
            dependency_files:
                - /pip/multi-dir/foo/requirements.txt
                - /pip/multi-dir/bar/requirements.txt
    - type: create_pull_request
      expect:
        data:
            base-commit-sha: 0962713db3cb346a729e68bc86706ac7372f9067
            dependencies:
                - name: urllib3
                  previous-requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.0
                      source: null
                  previous-version: "1.0"
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==2.1.0
                      source: null
                  version: 2.1.0
                  directory: /pip/multi-dir/foo
                - name: numpy
                  previous-requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.0
                      source: null
                  previous-version: "1.0"
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.26.2
                      source: null
                  version: 1.26.2
                  directory: /pip/multi-dir/bar
            updated-dependency-files:
                - content: |
                    urllib3==2.1.0
                    Flask[async]==2.0.0
                  content_encoding: utf-8
                  deleted: false
                  directory: /pip/multi-dir/foo
                  name: requirements.txt
                  operation: update
                  support_file: false
                  type: file
                - content: |
                    urllib3[socks]==1.0
                    numpy==1.26.2
                  content_encoding: utf-8
                  deleted: false
                  directory: /pip/multi-dir/bar
                  name: requirements.txt
                  operation: update
                  support_file: false
                  type: file
            pr-title: bump the python_pkgs group across 2 directories with 2 updates
            commit-message: bump the python_pkgs group across 2 directories with 2 updates
            dependency-group:
                name: python_pkgs
    - type: create_pull_request
      expect:
        data:
            base-commit-sha: 0962713db3cb346a729e68bc86706ac7372f9067
            dependencies:
                - name: flask[async]
                  previous-requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==2.0.0
                      source: null
                  previous-version: 2.0.0
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==3.0.2
                      source: null
                  version: 3.0.2
                  directory: /pip/multi-dir/foo
            updated-dependency-files:
                - content: |
                    urllib3==1.0
                    Flask[async]==3.0.2
                  content_encoding: utf-8
                  deleted: false
                  directory: /pip/multi-dir/foo
                  name: requirements.txt
                  operation: update
                  support_file: false
                  type: file
            pr-title: bump flask[async] from 2.0.0 to 3.0.2 in /pip/multi-dir/foo
            commit-message: bump flask[async] from 2.0.0 to 3.0.2 in /pip/multi-dir/foo
    - type: create_pull_request
      expect:
        data:
            base-commit-sha: 0962713db3cb346a729e68bc86706ac7372f9067
            dependencies:
                - name: urllib3[socks]
                  previous-requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.0
                      source: null
                  previous-version: "1.0"
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==2.1.0
                      source: null
                  version: 2.1.0
                  directory: /pip/multi-dir/bar
            updated-dependency-files:
                - content: |
                    urllib3[socks]==2.1.0
                    numpy==1.0
                  content_encoding: utf-8
                  deleted: false
                  directory: /pip/multi-dir/bar
                  name: requirements.txt
                  operation: update
                  support_file: false
                  type: file
            pr-title: bump urllib3[socks] from 1.0 to 2.1.0 in /pip/multi-dir/bar
            commit-message: bump urllib3[socks] from 1.0 to 2.1.0 in /pip/multi-dir/bar
    - type: mark_as_processed
      expect:
        data:
            base-commit-sha: 0962713db3cb346a729e68bc86706ac7372f9067
