            pr-title: Bump regex-syntax from 0.8.10 to 0.8.11 in /cargo/sparse-index
            pr-body: |
                Bumps [regex-syntax](https://github.com/rust-lang/regex) from 0.8.10 to 0.8.11.
                <details>
                <summary>Commits</summary>
                <ul>
                <li><a href="https://github.com/rust-lang/regex/commit/140167995737fa11dfe11b8af8b9aa143b790b4e"><code>1401679</code></a> regex-syntax-0.8.11</li>
                <li><a href="https://github.com/rust-lang/regex/commit/d7090000b3be51677d8e79c3b8bcc8a4d176bddc"><code>d709000</code></a> changelog: 1.12.4</li>
                <li><a href="https://github.com/rust-lang/regex/commit/9825c741c8ac1e61e8f78cebc12205cd35e4767f"><code>9825c74</code></a> syntax: avoid re-canonicalizing the entire IntervalSet on push (<a href="https://redirect.github.com/rust-lang/regex/issues/1308">#1308</a>)</li>
                <li><a href="https://github.com/rust-lang/regex/commit/a7f2ff6dbc43f40994d7c3d1d968ba4ac92329e1"><code>a7f2ff6</code></a> docs: clarify regex-lite word boundaries</li>
                <li><a href="https://github.com/rust-lang/regex/commit/2c7b17246da744bb2e1b911d3ddc1369fe3b472a"><code>2c7b172</code></a> docs: clarify unsupported Anchored::Pattern searches</li>
                <li>See full diff in <a href="https://github.com/rust-lang/regex/compare/regex-syntax-0.8.10...regex-syntax-0.8.11">compare view</a></li>
                </ul>
                </details>
                <br />
            commit-message: |-
                Bump regex-syntax from 0.8.10 to 0.8.11 in /cargo/sparse-index

                Bumps [regex-syntax](https://github.com/rust-lang/regex) from 0.8.10 to 0.8.11.
                - [Release notes](https://github.com/rust-lang/regex/releases)
                - [Changelog](https://github.com/rust-lang/regex/blob/master/CHANGELOG.md)
                - [Commits](https://github.com/rust-lang/regex/compare/regex-syntax-0.8.10...regex-syntax-0.8.11)
