            pr-title: Bump uuid from 1.23.2 to 1.23.3 in /cargo/sparse-index
            pr-body: |
                Bumps [uuid](https://github.com/uuid-rs/uuid) from 1.23.2 to 1.23.3.
                <details>
                <summary>Release notes</summary>
                <p><em>Sourced from <a href="https://github.com/uuid-rs/uuid/releases">uuid's releases</a>.</em></p>
                <blockquote>
                <h2>v1.23.3</h2>
                <h2>What's Changed</h2>
                <ul>
                <li>Fix up parser panic on empty input by <a href="https://github.com/KodrAus"><code>@​KodrAus</code></a> in <a href="https://redirect.github.com/uuid-rs/uuid/pull/886">uuid-rs/uuid#886</a></li>
                <li>Prepare for 1.23.3 release by <a href="https://github.com/KodrAus"><code>@​KodrAus</code></a> in <a href="https://redirect.github.com/uuid-rs/uuid/pull/887">uuid-rs/uuid#887</a></li>
                </ul>
                <p><strong>Full Changelog</strong>: <a href="https://github.com/uuid-rs/uuid/compare/v1.23.2...v1.23.3">https://github.com/uuid-rs/uuid/compare/v1.23.2...v1.23.3</a></p>
                </blockquote>
                </details>
                <details>
                <summary>Commits</summary>
                <ul>
                <li><a href="https://github.com/uuid-rs/uuid/commit/20da78b1813319c8017d107089caec1ff9d6b1a8"><code>20da78b</code></a> Merge pull request <a href="https://redirect.github.com/uuid-rs/uuid/issues/887">#887</a> from uuid-rs/cargo/v1.23.3</li>
                <li><a href="https://github.com/uuid-rs/uuid/commit/62232ca120b1b09eea5979ca966e9669705e8841"><code>62232ca</code></a> prepare for 1.23.3 release</li>
                <li><a href="https://github.com/uuid-rs/uuid/commit/2320c6a0335cfddaec4df58d1a7fe410070ab9e9"><code>2320c6a</code></a> Merge pull request <a href="https://redirect.github.com/uuid-rs/uuid/issues/886">#886</a> from uuid-rs/fix/parser-panics</li>
                <li><a href="https://github.com/uuid-rs/uuid/commit/2d034d41a518b0a103e96d47e04690f6644de487"><code>2d034d4</code></a> fix some invalid indexers on error reporting</li>
                <li><a href="https://github.com/uuid-rs/uuid/commit/a8b9f142678d9640ba6dc80c5e2d69635d4dd62f"><code>a8b9f14</code></a> update fuzz infra and run in CI</li>
                <li>See full diff in <a href="https://github.com/uuid-rs/uuid/compare/v1.23.2...v1.23.3">compare view</a></li>
                </ul>
                </details>
                <br />
            commit-message: |-
                Bump uuid from 1.23.2 to 1.23.3 in /cargo/sparse-index

                Bumps [uuid](https://github.com/uuid-rs/uuid) from 1.23.2 to 1.23.3.
                - [Release notes](https://github.com/uuid-rs/uuid/releases)
                - [Commits](https://github.com/uuid-rs/uuid/compare/v1.23.2...v1.23.3)
