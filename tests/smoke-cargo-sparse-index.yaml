            pr-title: Bump zip from 4.6.1 to 8.6.0 in /cargo/sparse-index
            pr-body: "Bumps [zip](https://github.com/zip-rs/zip2) from 4.6.1 to 8.6.0.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/zip-rs/zip2/releases\">zip's releases</a>.</em></p>\n<blockquote>\n<h2>v8.6.0</h2>\n<h3><!-- raw HTML omitted -->\U0001F680 Features</h3>\n<ul>\n<li>add <code>compression not supported</code> as enum error (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/774\">#774</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F41B Bug Fixes</h3>\n<ul>\n<li>allow for <code>[u8]</code> as filename (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/775\">#775</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n<ul>\n<li>mark <code>ZipFlags</code> as non-exhaustive and add test for <code>HasZipMetadata</code> (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/777\">#777</a>)</li>\n<li>use and simplify is_dir (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/776\">#776</a>)</li>\n</ul>\n<h2>v8.5.1</h2>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n<ul>\n<li>change magic finder to stack buffer (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/763\">#763</a>)</li>\n<li>simplify extra field parsing (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/764\">#764</a>)</li>\n</ul>\n<h2>v8.5.0</h2>\n<h3><!-- raw HTML omitted -->\U0001F41B Bug Fixes</h3>\n<ul>\n<li>remove <code>zip64 comment</code> and add <code>zip64 extensible data sector</code> (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/747\">#747</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n<ul>\n<li>remove useless magic in struct (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/730\">#730</a>)</li>\n<li>change extra_field from Arc&lt;Vec<!-- raw HTML omitted -->&gt; to Arc&lt;[u8]&gt; (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/741\">#741</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->⚙️ Miscellaneous Tasks</h3>\n<ul>\n<li>cleanup README (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/758\">#758</a>)</li>\n</ul>\n<h2>v8.4.0</h2>\n<h3><!-- raw HTML omitted -->\U0001F680 Features</h3>\n<ul>\n<li>add a check for building benches (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/748\">#748</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n<ul>\n<li>split part of <code>read.rs</code> for code readability (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/744\">#744</a>)</li>\n<li>remove unused allow (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/745\">#745</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->⚡ Performance</h3>\n<ul>\n<li>skip BufReader for Stored files in make_reader (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/739\">#739</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->⚙️ Miscellaneous Tasks</h3>\n<!-- raw HTML omitted -->\n</blockquote>\n<p>... (truncated)</p>\n</details>\n<details>\n<summary>Changelog</summary>\n<p><em>Sourced from <a href=\"https://github.com/zip-rs/zip2/blob/master/CHANGELOG.md\">zip's changelog</a>.</em></p>\n<blockquote>\n<h2><a href=\"https://github.com/zip-rs/zip2/compare/v8.5.1...v8.6.0\">8.6.0</a> - 2026-04-25</h2>\n<h3><!-- raw HTML omitted -->\U0001F680 Features</h3>\n<ul>\n<li>add <code>compression not supported</code> as enum error (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/774\">#774</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F41B Bug Fixes</h3>\n<ul>\n<li>allow for <code>[u8]</code> as filename (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/775\">#775</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n<ul>\n<li>mark <code>ZipFlags</code> as non-exhaustive and add test for <code>HasZipMetadata</code> (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/777\">#777</a>)</li>\n<li>use and simplify is_dir (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/776\">#776</a>)</li>\n</ul>\n<h2><a href=\"https://github.com/zip-rs/zip2/compare/v8.5.0...v8.5.1\">8.5.1</a> - 2026-04-06</h2>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n<ul>\n<li>change magic finder to stack buffer (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/763\">#763</a>)</li>\n<li>simplify extra field parsing (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/764\">#764</a>)</li>\n</ul>\n<h2><a href=\"https://github.com/zip-rs/zip2/compare/v8.4.0...v8.5.0\">8.5.0</a> - 2026-04-01</h2>\n<h3><!-- raw HTML omitted -->\U0001F41B Bug Fixes</h3>\n<ul>\n<li>remove <code>zip64 comment</code> and add <code>zip64 extensible data sector</code> (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/747\">#747</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n<ul>\n<li>remove useless magic in struct (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/730\">#730</a>)</li>\n<li>change extra_field from Arc&lt;Vec<!-- raw HTML omitted -->&gt; to Arc&lt;[u8]&gt; (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/741\">#741</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->⚙️ Miscellaneous Tasks</h3>\n<ul>\n<li>cleanup README (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/758\">#758</a>)</li>\n</ul>\n<h2><a href=\"https://github.com/zip-rs/zip2/compare/v8.3.1...v8.4.0\">8.4.0</a> - 2026-03-23</h2>\n<h3><!-- raw HTML omitted -->\U0001F680 Features</h3>\n<ul>\n<li>add a check for building benches (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/748\">#748</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->\U0001F69C Refactor</h3>\n<ul>\n<li>split part of <code>read.rs</code> for code readability (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/744\">#744</a>)</li>\n<li>remove unused allow (<a href=\"https://redirect.github.com/zip-rs/zip2/pull/745\">#745</a>)</li>\n</ul>\n<h3><!-- raw HTML omitted -->⚡ Performance</h3>\n<!-- raw HTML omitted -->\n</blockquote>\n<p>... (truncated)</p>\n</details>\n<details>\n<summary>Commits</summary>\n<ul>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/771dfc534d2614158af5497ea3dff4d4208d7db1\"><code>771dfc5</code></a> chore: release v8.6.0 (<a href=\"https://redirect.github.com/zip-rs/zip2/issues/781\">#781</a>)</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/8e480ccb01def04dc4f15e3510ed435276c0df9f\"><code>8e480cc</code></a> chore(deps): update sha1 requirement from 0.10 to 0.11 (<a href=\"https://redirect.github.com/zip-rs/zip2/issues/767\">#767</a>)</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/2513bbe9a669f4d3c71fd6cf63e2c8f7cd63404d\"><code>2513bbe</code></a> chore(deps): update aes requirement from 0.8 to 0.9 (<a href=\"https://redirect.github.com/zip-rs/zip2/issues/787\">#787</a>)</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/957e240eb3e0caca1152bfef114cca260ff7755d\"><code>957e240</code></a> ci(deps): bump actions/cache from 5.0.4 to 5.0.5 (<a href=\"https://redirect.github.com/zip-rs/zip2/issues/786\">#786</a>)</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/0329d9d0b63d2648e52a89d27437315b71343852\"><code>0329d9d</code></a> fix: allow for <code>[u8]</code> as filename (<a href=\"https://redirect.github.com/zip-rs/zip2/issues/775\">#775</a>)</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/ddcf8544c64ce6496b19df9ea84211deefbdd714\"><code>ddcf854</code></a> ci(deps): bump github/codeql-action from 4.35.1 to 4.35.2 (<a href=\"https://redirect.github.com/zip-rs/zip2/issues/788\">#788</a>)</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/42323a87ef97bb71f0a0506cfdbf5b4c815dcffc\"><code>42323a8</code></a> ci(deps): bump actions/create-github-app-token from 3.0.0 to 3.1.1 (<a href=\"https://redirect.github.com/zip-rs/zip2/issues/785\">#785</a>)</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/901014a1f2123697ea3803140bfc3b4f0565b205\"><code>901014a</code></a> ci(deps): bump crate-ci/typos from 1.45.0 to 1.45.1 (<a href=\"https://redirect.github.com/zip-rs/zip2/issues/784\">#784</a>)</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/07702d4e432ef7a349b81a9dbb88df17a2e7b9d1\"><code>07702d4</code></a> feat: add <code>compression not supported</code> as enum error (<a href=\"https://redirect.github.com/zip-rs/zip2/issues/774\">#774</a>)</li>\n<li><a href=\"https://github.com/zip-rs/zip2/commit/2d0c46b7baf11bf7f461b54ac69a681bc8b89557\"><code>2d0c46b</code></a> ci(deps): bump actions/upload-artifact from 7.0.0 to 7.0.1 (<a href=\"https://redirect.github.com/zip-rs/zip2/issues/783\">#783</a>)</li>\n<li>Additional commits viewable in <a href=\"https://github.com/zip-rs/zip2/compare/v4.6.1...v8.6.0\">compare view</a></li>\n</ul>\n</details>\n<br />\n"
