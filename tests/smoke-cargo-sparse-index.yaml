            pr-title: Bump toml from 0.8.23 to 1.1.2+spec-1.1.0 in /cargo/sparse-index
            pr-body: |
                Bumps [toml](https://github.com/toml-rs/toml) from 0.8.23 to 1.1.2+spec-1.1.0.
                <details>
                <summary>Commits</summary>
                <ul>
                <li><a href="https://github.com/toml-rs/toml/commit/a3d0047c95dfc6e82997d508dd93c9908650a418"><code>a3d0047</code></a> chore: Release</li>
                <li><a href="https://github.com/toml-rs/toml/commit/cc37615fc8d9213594250043e0e3b6cf73ed1e69"><code>cc37615</code></a> docs: Update changelog</li>
                <li><a href="https://github.com/toml-rs/toml/commit/7f5e9e130ae2cb17497cd7811a4a1e78fb5715d7"><code>7f5e9e1</code></a> fix(parser): Consolidate invalid unquoted key into one error (<a href="https://redirect.github.com/toml-rs/toml/issues/1138">#1138</a>)</li>
                <li><a href="https://github.com/toml-rs/toml/commit/52feb9070cca1734db13d22796efd1115835881b"><code>52feb90</code></a> fix(parser): Consolidate invalid unquoted key into one error</li>
                <li><a href="https://github.com/toml-rs/toml/commit/aad85d4921e8eb500cc7a26ac1165f111a59c433"><code>aad85d4</code></a> chore(deps): Update j178/prek-action action to v2 (<a href="https://redirect.github.com/toml-rs/toml/issues/1136">#1136</a>)</li>
                <li><a href="https://github.com/toml-rs/toml/commit/8b1ac44bcae5ffc4e58e8809a031ab05f486ccbe"><code>8b1ac44</code></a> chore(deps): Update compatible (dev) (<a href="https://redirect.github.com/toml-rs/toml/issues/1135">#1135</a>)</li>
                <li><a href="https://github.com/toml-rs/toml/commit/9effd79ff2ea692420931e2e4d58969525e6c398"><code>9effd79</code></a> chore(deps): Update j178/prek-action action to v2</li>
                <li><a href="https://github.com/toml-rs/toml/commit/9db8aad6eafbc62f6b9d1950117649cc41eaf695"><code>9db8aad</code></a> chore: Release</li>
                <li><a href="https://github.com/toml-rs/toml/commit/e55a6633d9e16e4406db8a9fb8ce26fa84fb1553"><code>e55a663</code></a> docs: Update changelog</li>
                <li><a href="https://github.com/toml-rs/toml/commit/c11d7d7ad38781b66e7df34371ce3969677bc62d"><code>c11d7d7</code></a> Optimisations (<a href="https://redirect.github.com/toml-rs/toml/issues/1133">#1133</a>)</li>
                <li>Additional commits viewable in <a href="https://github.com/toml-rs/toml/compare/toml-v0.8.23...toml-v1.1.2">compare view</a></li>
                </ul>
                </details>
                <br />
