            pr-title: Bump regex from 1.12.3 to 1.12.4 in /cargo/sparse-index
            pr-body: |
                Bumps [regex](https://github.com/rust-lang/regex) from 1.12.3 to 1.12.4.
                <details>
                <summary>Changelog</summary>
                <p><em>Sourced from <a href="https://github.com/rust-lang/regex/blob/master/CHANGELOG.md">regex's changelog</a>.</em></p>
                <blockquote>
                <h1>1.12.4 (2025-06-09)</h1>
                <p>This release includes a performance optimization for compilation of regexes
                with very large character classes.</p>
                <p>Improvements:</p>
                <ul>
                <li><a href="https://redirect.github.com/rust-lang/regex/pull/1308">#1308</a>:
                Avoid re-canonicalizing the entire interval set when pushing new class ranges.</li>
                </ul>
                </blockquote>
                </details>
                <details>
                <summary>Commits</summary>
                <ul>
                <li><a href="https://github.com/rust-lang/regex/commit/7b96fdc9d5fe6a0cb4efe30e6689b050493fc1e1"><code>7b96fdc</code></a> 1.12.4</li>
                <li><a href="https://github.com/rust-lang/regex/commit/7b89cf0534aa58ab8a4a6672e14a59b53f08eb2c"><code>7b89cf0</code></a> deps: update to regex-syntax 0.8.11</li>
                <li><a href="https://github.com/rust-lang/regex/commit/140167995737fa11dfe11b8af8b9aa143b790b4e"><code>1401679</code></a> regex-syntax-0.8.11</li>
                <li><a href="https://github.com/rust-lang/regex/commit/d7090000b3be51677d8e79c3b8bcc8a4d176bddc"><code>d709000</code></a> changelog: 1.12.4</li>
                <li><a href="https://github.com/rust-lang/regex/commit/9825c741c8ac1e61e8f78cebc12205cd35e4767f"><code>9825c74</code></a> syntax: avoid re-canonicalizing the entire IntervalSet on push (<a href="https://redirect.github.com/rust-lang/regex/issues/1308">#1308</a>)</li>
                <li><a href="https://github.com/rust-lang/regex/commit/a7f2ff6dbc43f40994d7c3d1d968ba4ac92329e1"><code>a7f2ff6</code></a> docs: clarify regex-lite word boundaries</li>
                <li><a href="https://github.com/rust-lang/regex/commit/2c7b17246da744bb2e1b911d3ddc1369fe3b472a"><code>2c7b172</code></a> docs: clarify unsupported Anchored::Pattern searches</li>
                <li><a href="https://github.com/rust-lang/regex/commit/839d16bc65b60e2006d3599d20bfa6efc14049d8"><code>839d16b</code></a> regex-syntax-0.8.10</li>
                <li><a href="https://github.com/rust-lang/regex/commit/c4865a0c8446a701e10b0fd987f19068f5dcc365"><code>c4865a0</code></a> syntax: fix negation handling in HIR translation</li>
                <li><a href="https://github.com/rust-lang/regex/commit/d8761c00ed25c5899e3dcfb0f17e827b8e41530a"><code>d8761c0</code></a> cargo: also include <code>benches</code></li>
                <li>Additional commits viewable in <a href="https://github.com/rust-lang/regex/compare/1.12.3...1.12.4">compare view</a></li>
                </ul>
                </details>
                <br />
            commit-message: |-
                Bump regex from 1.12.3 to 1.12.4 in /cargo/sparse-index

                Bumps [regex](https://github.com/rust-lang/regex) from 1.12.3 to 1.12.4.
                - [Release notes](https://github.com/rust-lang/regex/releases)
                - [Changelog](https://github.com/rust-lang/regex/blob/master/CHANGELOG.md)
                - [Commits](https://github.com/rust-lang/regex/compare/1.12.3...1.12.4)
