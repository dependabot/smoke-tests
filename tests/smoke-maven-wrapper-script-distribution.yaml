            pr-title: Bump org.apache.maven.wrapper:maven-wrapper from 3.3.2 to 3.3.4 in /maven-wrapper/script-distribution
            pr-body: "Bumps [org.apache.maven.wrapper:maven-wrapper](https://github.com/apache/maven-wrapper) from 3.3.2 to 3.3.4.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/apache/maven-wrapper/releases\">org.apache.maven.wrapper:maven-wrapper's releases</a>.</em></p>\n<blockquote>\n<h2>3.3.4</h2>\n<!-- raw HTML omitted -->\n<h2>\U0001F41B Bug Fixes</h2>\n<ul>\n<li>Revert wrapper version removal (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/365\">#365</a>) <a href=\"https://github.com/breun\"><code>@​breun</code></a></li>\n</ul>\n<h2>\U0001F47B Maintenance</h2>\n<ul>\n<li>Ensure Path Traversal is fully addressed in MavenWrapperDownloader (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/363\">#363</a>) <a href=\"https://github.com/hazendaz\"><code>@​hazendaz</code></a></li>\n</ul>\n<h2>3.3.3</h2>\n<!-- raw HTML omitted -->\n<h2>:boom: Breaking changes</h2>\n<ul>\n<li>Remove wrapper lifecycle (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/357\">#357</a>) <a href=\"https://github.com/slawekjaranowski\"><code>@​slawekjaranowski</code></a></li>\n</ul>\n<h2>\U0001F680 New features and improvements</h2>\n<ul>\n<li>Fix Maven wrapper support for snapshot distributions (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/335\">#335</a>) <a href=\"https://github.com/gnodet\"><code>@​gnodet</code></a></li>\n</ul>\n<h2>\U0001F41B Bug Fixes</h2>\n<ul>\n<li><a href=\"https://issues.apache.org/jira/browse/MWRAPPER-143\">[MWRAPPER-143]</a> - The wrapperVersion property is not used in only-script mode (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/145\">#145</a>) <a href=\"https://github.com/bdemers\"><code>@​bdemers</code></a></li>\n<li>fix: Maven wrapper relative distributionUrl does not work (fixes <a href=\"https://redirect.github.com/apache/maven-wrapper/issues/272\">#272</a>) (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/107\">#107</a>) <a href=\"https://github.com/danishcake\"><code>@​danishcake</code></a></li>\n<li>Fix Windows Junction Link support in mvnw.cmd (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/143\">#143</a>) <a href=\"https://github.com/fp024\"><code>@​fp024</code></a></li>\n<li><a href=\"https://issues.apache.org/jira/browse/MWRAPPER-158\">[MWRAPPER-158]</a> - Remove incorrect license header (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/166\">#166</a>) <a href=\"https://github.com/lbruun\"><code>@​lbruun</code></a></li>\n<li><a href=\"https://issues.apache.org/jira/browse/MWRAPPER-161\">[MWRAPPER-161]</a> - Improve script directory detection when using sh mvnw (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/329\">#329</a>) <a href=\"https://github.com/ppkarwasz\"><code>@​ppkarwasz</code></a></li>\n<li><a href=\"https://issues.apache.org/jira/browse/MWRAPPER-162\">[MWRAPPER-162]</a> - Removed dead link was getting 404 (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/167\">#167</a>) <a href=\"https://github.com/montu376\"><code>@​montu376</code></a></li>\n<li><a href=\"https://issues.apache.org/jira/browse/MWRAPPER-159\">[MWRAPPER-159]</a> - Fix shellcheck in mvnw (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/168\">#168</a>) <a href=\"https://github.com/slawekjaranowski\"><code>@​slawekjaranowski</code></a></li>\n<li><a href=\"https://issues.apache.org/jira/browse/MWRAPPER-146\">[MWRAPPER-146]</a> - Bad substitution on Windows if MVNW_REPOURL is set on script-only (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/151\">#151</a>) <a href=\"https://github.com/jahk04\"><code>@​jahk04</code></a></li>\n<li><a href=\"https://issues.apache.org/jira/browse/MWRAPPER-147\">[MWRAPPER-147]</a> - mvnw.cmd fails to launch maven if username contains space (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/152\">#152</a>) <a href=\"https://github.com/sebthom\"><code>@​sebthom</code></a></li>\n<li><a href=\"https://issues.apache.org/jira/browse/MWRAPPER-150\">[MWRAPPER-150]</a> - Fails to validate checksums on MacOS Sequoia (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/155\">#155</a>) <a href=\"https://github.com/jon-signal\"><code>@​jon-signal</code></a></li>\n<li><a href=\"https://issues.apache.org/jira/browse/MWRAPPER-111\">[MWRAPPER-111]</a> - Trim whitespace when reading from properties file (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/158\">#158</a>) <a href=\"https://github.com/mhalbritter\"><code>@​mhalbritter</code></a></li>\n<li><a href=\"https://issues.apache.org/jira/browse/MWRAPPER-153\">[MWRAPPER-153]</a> - Fixed only-mvnw.cmd fails when FIPS mode is enabled on Windows hosts (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/157\">#157</a>) <a href=\"https://github.com/zbalkan\"><code>@​zbalkan</code></a></li>\n</ul>\n<h2>\U0001F4DD Documentation updates</h2>\n<ul>\n<li>Clarify usage of MAVEN_USER_HOME (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/359\">#359</a>) <a href=\"https://github.com/slawekjaranowski\"><code>@​slawekjaranowski</code></a></li>\n<li>site is now /tools/wrapper (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/336\">#336</a>) <a href=\"https://github.com/hboutemy\"><code>@​hboutemy</code></a></li>\n</ul>\n<h2>\U0001F47B Maintenance</h2>\n<ul>\n<li>Use invoker version from parent (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/356\">#356</a>) <a href=\"https://github.com/slawekjaranowski\"><code>@​slawekjaranowski</code></a></li>\n<li>Refresh download page (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/354\">#354</a>) <a href=\"https://github.com/slawekjaranowski\"><code>@​slawekjaranowski</code></a></li>\n<li>Update site descriptor to 2.0.0 (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/351\">#351</a>) <a href=\"https://github.com/slawekjaranowski\"><code>@​slawekjaranowski</code></a></li>\n<li>Enable prevent branch protection rules (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/348\">#348</a>) <a href=\"https://github.com/slawekjaranowski\"><code>@​slawekjaranowski</code></a></li>\n<li>Copy edit docs (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/344\">#344</a>) <a href=\"https://github.com/elharo\"><code>@​elharo</code></a></li>\n<li>Prefer <a href=\"https://github.com/Inject\"><code>@​Inject</code></a> (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/343\">#343</a>) <a href=\"https://github.com/elharo\"><code>@​elharo</code></a></li>\n<li>Bump shellcheck to 0.10.0 (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/333\">#333</a>) <a href=\"https://github.com/slachiewicz\"><code>@​slachiewicz</code></a></li>\n<li>Enable GitHub Issues (<a href=\"https://redirect.github.com/apache/maven-wrapper/pull/169\">#169</a>) <a href=\"https://github.com/slawekjaranowski\"><code>@​slawekjaranowski</code></a></li>\n</ul>\n<!-- raw HTML omitted -->\n</blockquote>\n<p>... (truncated)</p>\n</details>\n<details>\n<summary>Commits</summary>\n<ul>\n<li><a href=\"https://github.com/apache/maven-wrapper/commit/524486aff97d0748926a977665d5befb3251ff17\"><code>524486a</code></a> [maven-release-plugin] prepare release maven-wrapper-3.3.4</li>\n<li><a href=\"https://github.com/apache/maven-wrapper/commit/17c1ec9d1a3c6fa1c39c6d8fc48f4735f957ce27\"><code>17c1ec9</code></a> Revert wrapper version removal (<a href=\"https://redirect.github.com/apache/maven-wrapper/issues/365\">#365</a>)</li>\n<li><a href=\"https://github.com/apache/maven-wrapper/commit/366207fa0678f6549b109fb75152d2558766bf58\"><code>366207f</code></a> Ensure Path Traversal is fully addressed in MavenWrapperDownloader</li>\n<li><a href=\"https://github.com/apache/maven-wrapper/commit/086b1c9fa610d54674aecf8c97868bc57566304d\"><code>086b1c9</code></a> [maven-release-plugin] prepare for next development iteration</li>\n<li><a href=\"https://github.com/apache/maven-wrapper/commit/e2a0c81e6d5c8d0a65d152cbb4a2744bb35f5e49\"><code>e2a0c81</code></a> [maven-release-plugin] prepare release maven-wrapper-3.3.3</li>\n<li><a href=\"https://github.com/apache/maven-wrapper/commit/80952cd926da568000d99fe701cc86d935309d2f\"><code>80952cd</code></a> Clarify usage of MAVEN_USER_HOME</li>\n<li><a href=\"https://github.com/apache/maven-wrapper/commit/08e7200e6166aea41bcf520547ea9a266b7bf52c\"><code>08e7200</code></a> Remove wrapper lifecycle</li>\n<li><a href=\"https://github.com/apache/maven-wrapper/commit/36886faf9b74bfc27e23cf0a78084e39761aee52\"><code>36886fa</code></a> Support for snapshot distributions - fix (<a href=\"https://redirect.github.com/apache/maven-wrapper/issues/352\">#352</a>)</li>\n<li><a href=\"https://github.com/apache/maven-wrapper/commit/d02d84532a4626e326af5c2b744dade16bb60a98\"><code>d02d845</code></a> Use invoker version from parent</li>\n<li><a href=\"https://github.com/apache/maven-wrapper/commit/af7671b365fb850e8c35ea9797e818ed5c4a740a\"><code>af7671b</code></a> Bump mavenVersion from 3.9.6 to 3.9.11 (<a href=\"https://redirect.github.com/apache/maven-wrapper/issues/360\">#360</a>)</li>\n<li>Additional commits viewable in <a href=\"https://github.com/apache/maven-wrapper/compare/maven-wrapper-3.3.2...maven-wrapper-3.3.4\">compare view</a></li>\n</ul>\n</details>\n<br />\n"
            commit-message: |-
                Bump org.apache.maven.wrapper:maven-wrapper

                Bumps [org.apache.maven.wrapper:maven-wrapper](https://github.com/apache/maven-wrapper) from 3.3.2 to 3.3.4.
