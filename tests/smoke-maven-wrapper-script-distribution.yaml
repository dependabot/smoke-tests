              source: tests/smoke-maven-wrapper-script-distribution.yaml
              version-requirement: '>3.9.15'
            - dependency-name: org.apache.maven.wrapper:maven-wrapper
              source: tests/smoke-maven-wrapper-script-distribution.yaml
              version-requirement: '>3.3.4'
        source:
            provider: github
            repo: yeikel/smoke-tests
            directories:
                - maven-wrapper/script-distribution
            commit: 49b5d7b864f085ff0249e6fa19573604319f3e1a
            hostname: github.com
            api-endpoint: https://api.github.com
