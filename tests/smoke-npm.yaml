input:
    job:
        command: update
        package-manager: npm_and_yarn
        allowed-updates:
            - update-type: all
        experiments:
            enable_cooldown_for_npm_and_yarn: true
            record-ecosystem-versions: true
        ignore-conditions:
            - dependency-name: axios
              source: tests/smoke-npm.yaml
              version-requirement: '>1.4.0'
            - dependency-name: etag
              source: tests/smoke-npm.yaml
              version-requirement: '>1.8.1'
            - dependency-name: fetch-factory
              source: tests/smoke-npm.yaml
              version-requirement: '>0.2.1'
            - dependency-name: lodash
              source: tests/smoke-npm.yaml
              version-requirement: '>4.17.21'
            - dependency-name: get-intrinsic
              source: tests/smoke-npm.yaml
              version-requirement: '>1.0.3'
            - dependency-name: call-bound
              source: tests/smoke-npm.yaml
              version-requirement: '>1.0.3'
            - dependency-name: follow-redirects
              source: tests/smoke-npm.yaml
              version-requirement: '>1.15.11'
            - dependency-name: form-data
              source: tests/smoke-npm.yaml
              version-requirement: '>4.0.5'
        source:
            provider: github
            repo: dependabot/smoke-tests
            directory: /npm
            commit: d15ce2f331fa91f5ebb82da530dc7f3d69c64e6e
    credentials:
        - host: github.com
          password: $LOCAL_GITHUB_ACCESS_TOKEN
          type: git_source
          username: x-access-token
