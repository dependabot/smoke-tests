                <details>
                <summary>Commits</summary>
                <ul>
                <li><a href="https://github.com/numpy/numpy/commit/c81c49f77451340651a751e76bca607d85e4fd55"><code>c81c49f</code></a> Merge pull request <a href="https://redirect.github.com/numpy/numpy/issues/30757">#30757</a> from charris/prepare-2.4.2</li>
