input:
    job:
        command: update
        package-manager: pip
        allowed-updates:
            - dependency-type: direct
              update-type: all
        ignore-conditions:
            - dependency-name: django
              source: tests/smoke-pip.yaml
              version-requirement: '>4.0.6'
            - dependency-name: numpy
              source: tests/smoke-python-pip.yaml
              version-requirement: '>2.4.2'
            - dependency-name: requests
              source: tests/smoke-python-pip.yaml
              version-requirement: '>2.32.3'
        source:
            provider: github
            repo: dependabot/smoke-tests
            directory: /pip/
            commit: 0962713db3cb346a729e68bc86706ac7372f9067
    credentials:
        - host: github.com
          password: $LOCAL_GITHUB_ACCESS_TOKEN
          type: git_source
          username: x-access-token
output:
    - type: update_dependency_list
      expect:
        data:
            dependencies:
                - name: django
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: <4.0,>=3.1
                      source: null
                  version: null
                - name: requests[socks]
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==2.28.0
                      source: null
                  version: 2.28.0
                - name: pyyaml
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: null
                      source: null
                  version: null
                - name: pytest
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: null
                      source: null
                  version: null
                - name: numpy
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.23.0
                      source: null
                  version: 1.23.0
            dependency_files:
                - /pip/requirements.txt
    - type: create_pull_request
      expect:
        data:
            base-commit-sha: 0962713db3cb346a729e68bc86706ac7372f9067
            dependencies:
                - name: django
                  previous-requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: <4.0,>=3.1
                      source: null
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: '>=3.1,<5.0'
                      source: null
                  version: 4.0.6
                  directory: /pip
            updated-dependency-files:
                - content: |
                    Django>=3.1,<5.0
                    requests[socks]==2.28.0
                    pyyaml
                    pytest
                    numpy==1.23.0
                  content_encoding: utf-8
                  deleted: false
                  directory: /pip
                  name: requirements.txt
                  operation: update
                  support_file: false
                  type: file
            pr-title: update django requirement from <4.0,>=3.1 to >=3.1,<5.0 in /pip
            commit-message: update django requirement from <4.0,>=3.1 to >=3.1,<5.0 in /pip
    - type: create_pull_request
      expect:
        data:
            base-commit-sha: 0962713db3cb346a729e68bc86706ac7372f9067
            dependencies:
                - name: requests[socks]
                  previous-requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==2.28.0
                      source: null
                  previous-version: 2.28.0
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==2.32.3
                      source: null
                  version: 2.32.3
                  directory: /pip
            updated-dependency-files:
                - content: |
                    Django>=3.1,<4.0
                    requests[socks]==2.32.3
                    pyyaml
                    pytest
                    numpy==1.23.0
                  content_encoding: utf-8
                  deleted: false
                  directory: /pip
                  name: requirements.txt
                  operation: update
                  support_file: false
                  type: file
            pr-title: bump requests[socks] from 2.28.0 to 2.32.3 in /pip
            commit-message: bump requests[socks] from 2.28.0 to 2.32.3 in /pip
    - type: create_pull_request
      expect:
        data:
            base-commit-sha: 0962713db3cb346a729e68bc86706ac7372f9067
            dependencies:
                - name: numpy
                  previous-requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.23.0
                      source: null
                  previous-version: 1.23.0
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==2.4.2
                      source: null
                  version: 2.4.2
                  directory: /pip
            updated-dependency-files:
                - content: |
                    Django>=3.1,<4.0
                    requests[socks]==2.28.0
                    pyyaml
                    pytest
                    numpy==2.4.2
                  content_encoding: utf-8
                  deleted: false
                  directory: /pip
                  name: requirements.txt
                  operation: update
                  support_file: false
                  type: file
            pr-title: bump numpy from 1.23.0 to 2.4.2 in /pip
            commit-message: bump numpy from 1.23.0 to 2.4.2 in /pip
    - type: mark_as_processed
      expect:
        data:
            base-commit-sha: 0962713db3cb346a729e68bc86706ac7372f9067
