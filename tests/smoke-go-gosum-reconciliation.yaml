      expect:
        data:
            dependencies:
                - name: github.com/fatih/color
                  requirements:
                      - file: go.mod
                        groups: []
                        requirement: v1.7.0
                        source:
                            source: github.com/fatih/color
                            type: default
                  version: 1.7.0
                - name: rsc.io/quote
                  requirements:
                      - file: go.mod
                        groups: []
                        requirement: v1.4.0
                        source:
                            source: rsc.io/quote
                            type: default
                  version: 1.4.0
            dependency_files:
                - /go/gosum-reconciliation/go.mod
                - /go/gosum-reconciliation/go.sum
    - type: create_pull_request
      expect:
