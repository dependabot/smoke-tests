            pr-body: "Bumps [npm-package-json-lint](https://github.com/tclindner/npm-package-json-lint) from 9.0.0 to 10.2.1.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/tclindner/npm-package-json-lint/releases\">npm-package-json-lint's releases</a>.</em></p>\n<blockquote>\n<h2>v10.2.1</h2>\n<!-- raw HTML omitted -->\n<h2>What's Changed</h2>\n<h3>\U0001F9F9 Chores</h3>\n<ul>\n<li>Enable Dependabot for website and update deps by <a href=\"https://github.com/tclindner\"><code>@​tclindner</code></a> in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1752\">tclindner/npm-package-json-lint#1752</a></li>\n<li>build(deps-dev): Bump eslint from 10.1.0 to 10.2.0 by <a href=\"https://github.com/dependabot\"><code>@​dependabot</code></a>[bot] in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1756\">tclindner/npm-package-json-lint#1756</a></li>\n<li>build(deps-dev): Bump <code>@​types/node</code> from 25.5.0 to 25.5.2 by <a href=\"https://github.com/dependabot\"><code>@​dependabot</code></a>[bot] in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1758\">tclindner/npm-package-json-lint#1758</a></li>\n<li>build(deps): Bump path-to-regexp from 1.8.0 to 1.9.0 in /website by <a href=\"https://github.com/dependabot\"><code>@​dependabot</code></a>[bot] in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1757\">tclindner/npm-package-json-lint#1757</a></li>\n<li>build(deps): Bump react from 18.3.1 to 19.2.4 in /website by <a href=\"https://github.com/dependabot\"><code>@​dependabot</code></a>[bot] in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1759\">tclindner/npm-package-json-lint#1759</a></li>\n<li>build(deps): Bump react-dom from 18.3.1 to 19.2.4 in /website by <a href=\"https://github.com/dependabot\"><code>@​dependabot</code></a>[bot] in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1755\">tclindner/npm-package-json-lint#1755</a></li>\n<li>Switch build tooling to <code>tsdown</code> by <a href=\"https://github.com/tclindner\"><code>@​tclindner</code></a> in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1760\">tclindner/npm-package-json-lint#1760</a></li>\n<li>build(deps): Bump type-fest from 5.3.1 to 5.5.0 by <a href=\"https://github.com/dependabot\"><code>@​dependabot</code></a>[bot] in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1736\">tclindner/npm-package-json-lint#1736</a></li>\n<li>Rename eslint.config to .mjs and clean lint comments by <a href=\"https://github.com/tclindner\"><code>@​tclindner</code></a> in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1761\">tclindner/npm-package-json-lint#1761</a></li>\n<li>Use text severity labels and add plur util by <a href=\"https://github.com/tclindner\"><code>@​tclindner</code></a> in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1762\">tclindner/npm-package-json-lint#1762</a></li>\n<li>build(deps-dev): Bump <code>@​types/node</code> from 25.5.2 to 25.6.0 by <a href=\"https://github.com/dependabot\"><code>@​dependabot</code></a>[bot] in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1773\">tclindner/npm-package-json-lint#1773</a></li>\n<li>build(deps-dev): Bump prettier from 3.8.1 to 3.8.2 by <a href=\"https://github.com/dependabot\"><code>@​dependabot</code></a>[bot] in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1775\">tclindner/npm-package-json-lint#1775</a></li>\n<li>build(deps-dev): Bump eslint-plugin-jest from 29.15.1 to 29.15.2 by <a href=\"https://github.com/dependabot\"><code>@​dependabot</code></a>[bot] in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1771\">tclindner/npm-package-json-lint#1771</a></li>\n<li>build(deps-dev): Bump typescript-eslint from 8.58.0 to 8.58.1 by <a href=\"https://github.com/dependabot\"><code>@​dependabot</code></a>[bot] in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1768\">tclindner/npm-package-json-lint#1768</a></li>\n</ul>\n<h3>\U0001F381 Other</h3>\n<ul>\n<li>Potential fix for code scanning alert no. 8: Workflow does not contain permissions by <a href=\"https://github.com/tclindner\"><code>@​tclindner</code></a> in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1748\">tclindner/npm-package-json-lint#1748</a></li>\n<li>Potential fix for code scanning alert no. 7: Workflow does not contain permissions by <a href=\"https://github.com/tclindner\"><code>@​tclindner</code></a> in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1751\">tclindner/npm-package-json-lint#1751</a></li>\n<li>Potential fix for code scanning alert no. 6: Workflow does not contain permissions by <a href=\"https://github.com/tclindner\"><code>@​tclindner</code></a> in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1750\">tclindner/npm-package-json-lint#1750</a></li>\n<li>build(deps): Bump actions/checkout from 5 to 6 by <a href=\"https://github.com/dependabot\"><code>@​dependabot</code></a>[bot] in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1753\">tclindner/npm-package-json-lint#1753</a></li>\n<li>Bump ajv from 6.12.6 to 6.14.0 by <a href=\"https://github.com/ericcornelissen\"><code>@​ericcornelissen</code></a> in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1776\">tclindner/npm-package-json-lint#1776</a></li>\n</ul>\n<h2>New Contributors</h2>\n<ul>\n<li><a href=\"https://github.com/ericcornelissen\"><code>@​ericcornelissen</code></a> made their first contribution in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1776\">tclindner/npm-package-json-lint#1776</a></li>\n</ul>\n<p><strong>Full Changelog</strong>: <a href=\"https://github.com/tclindner/npm-package-json-lint/compare/v10.2.0...v10.2.1\">https://github.com/tclindner/npm-package-json-lint/compare/v10.2.0...v10.2.1</a></p>\n<h2>v10.2.0</h2>\n<!-- raw HTML omitted -->\n<h2>What's Changed</h2>\n<h3>\U0001F451 Changed</h3>\n<ul>\n<li>Add prefer-no-bin rule, tests and docs by <a href=\"https://github.com/tclindner\"><code>@​tclindner</code></a> in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1747\">tclindner/npm-package-json-lint#1747</a></li>\n</ul>\n<p><strong>Full Changelog</strong>: <a href=\"https://github.com/tclindner/npm-package-json-lint/compare/v10.1.0...v10.2.0\">https://github.com/tclindner/npm-package-json-lint/compare/v10.1.0...v10.2.0</a></p>\n<h2>v10.1.0</h2>\n<!-- raw HTML omitted -->\n<h2>What's Changed</h2>\n<h3>\U0001F451 Changed</h3>\n<ul>\n<li>Add peerDependencies rules, tests, and docs by <a href=\"https://github.com/tclindner\"><code>@​tclindner</code></a> in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1745\">tclindner/npm-package-json-lint#1745</a></li>\n<li>Add prefer-no-main rule by <a href=\"https://github.com/tclindner\"><code>@​tclindner</code></a> in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1746\">tclindner/npm-package-json-lint#1746</a></li>\n</ul>\n<h3>\U0001F9F9 Chores</h3>\n<ul>\n<li>build(deps-dev): Bump esbuild from 0.27.3 to 0.27.4 by <a href=\"https://github.com/dependabot\"><code>@​dependabot</code></a>[bot] in <a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/pull/1734\">tclindner/npm-package-json-lint#1734</a></li>\n</ul>\n<!-- raw HTML omitted -->\n</blockquote>\n<p>... (truncated)</p>\n</details>\n<details>\n<summary>Commits</summary>\n<ul>\n<li><a href=\"https://github.com/tclindner/npm-package-json-lint/commit/c0813bfea7d0f71bb435c327ced049f589109fec\"><code>c0813bf</code></a> Bump ajv from 6.12.6 to 6.14.0 (<a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/issues/1776\">#1776</a>)</li>\n<li><a href=\"https://github.com/tclindner/npm-package-json-lint/commit/64e135afc523a11ae56bb370a9d3d26233793fff\"><code>64e135a</code></a> build(deps-dev): Bump typescript-eslint from 8.58.0 to 8.58.1 (<a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/issues/1768\">#1768</a>)</li>\n<li><a href=\"https://github.com/tclindner/npm-package-json-lint/commit/2a473b4d0506f8806f864ba421cd2cbf699e294e\"><code>2a473b4</code></a> build(deps-dev): Bump eslint-plugin-jest from 29.15.1 to 29.15.2 (<a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/issues/1771\">#1771</a>)</li>\n<li><a href=\"https://github.com/tclindner/npm-package-json-lint/commit/52ee1f6be7567f988553000c9c65b5cada0dac79\"><code>52ee1f6</code></a> build(deps-dev): Bump prettier from 3.8.1 to 3.8.2 (<a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/issues/1775\">#1775</a>)</li>\n<li><a href=\"https://github.com/tclindner/npm-package-json-lint/commit/757b114788b5939e009e21e30b3237e8e2790dd7\"><code>757b114</code></a> build(deps-dev): Bump <code>@​types/node</code> from 25.5.2 to 25.6.0 (<a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/issues/1773\">#1773</a>)</li>\n<li><a href=\"https://github.com/tclindner/npm-package-json-lint/commit/2cc35284b9f7bca95150814a8a524ed7f54edf96\"><code>2cc3528</code></a> Use text severity labels and add plur util (<a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/issues/1762\">#1762</a>)</li>\n<li><a href=\"https://github.com/tclindner/npm-package-json-lint/commit/9b1bb8b25e03102eaa6c8e31c93ac4642e2d2bc4\"><code>9b1bb8b</code></a> Rename eslint.config to .mjs and clean lint comments (<a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/issues/1761\">#1761</a>)</li>\n<li><a href=\"https://github.com/tclindner/npm-package-json-lint/commit/68a16616a47b563df0657c5788b26d34930f8b01\"><code>68a1661</code></a> build(deps): Bump type-fest from 5.3.1 to 5.5.0 (<a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/issues/1736\">#1736</a>)</li>\n<li><a href=\"https://github.com/tclindner/npm-package-json-lint/commit/7e6c7ee932fc5e2c013791ee9a3cae95df3ddca7\"><code>7e6c7ee</code></a> Switch build tooling to <code>tsdown</code> (<a href=\"https://redirect.github.com/tclindner/npm-package-json-lint/issues/1760\">#1760</a>)</li>\n<li><a href=\"https://github.com/tclindner/npm-package-json-lint/commit/aee218a43836245f865c2c36a690e6afcb57f2b3\"><code>aee218a</code></a> Delete .eslintignore</li>\n<li>Additional commits viewable in <a href=\"https://github.com/tclindner/npm-package-json-lint/compare/v9.0.0...v10.2.1\">compare view</a></li>\n</ul>\n</details>\n<details>\n<summary>Maintainer changes</summary>\n<p>This version was pushed to npm by <a href=\"https://www.npmjs.com/~GitHub%20Actions\">GitHub Actions</a>, a new releaser for npm-package-json-lint since your current version.</p>\n</details>\n<br />\n"
