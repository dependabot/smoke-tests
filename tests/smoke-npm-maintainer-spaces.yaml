input:
    job:
        command: update
        package-manager: npm_and_yarn
        allowed-updates:
            - update-type: all
        experiments:
            enable_cooldown_for_npm_and_yarn: true
            record-ecosystem-versions: true
        ignore-conditions:
            - dependency-name: npm-package-json-lint
              source: tests/smoke-npm-maintainer-spaces.yaml
              version-requirement: '>10.2.1'
        source:
            provider: github
            repo: dependabot/smoke-tests
            directory: /npm/maintainer-spaces
            commit: 94ed4db8aaca0f018328e71bdbd28a2b7cbdd812
    credentials:
        - host: github.com
          password: $LOCAL_GITHUB_ACCESS_TOKEN
          type: git_source
          username: x-access-token
output:
    - type: record_ecosystem_versions
      expect:
        data:
            ecosystem_versions:
                package_managers:
                    npm: 8
    - type: update_dependency_list
      expect:
        data:
            dependencies:
                - name: npm-package-json-lint
                  requirements:
                    - file: package.json
                      groups:
                        - dependencies
                      requirement: 9.0.0
                      source:
                        type: registry
                        url: https://registry.npmjs.org
                  version: 9.0.0
            dependency_files:
                - /npm/maintainer-spaces/package.json
                - /npm/maintainer-spaces/package-lock.json
    - type: create_pull_request
      expect:
        data:
            base-commit-sha: 94ed4db8aaca0f018328e71bdbd28a2b7cbdd812
            dependencies:
                - name: npm-package-json-lint
                  previous-requirements:
                    - file: package.json
                      groups:
                        - dependencies
                      requirement: 9.0.0
                      source:
                        type: registry
                        url: https://registry.npmjs.org
                  previous-version: 9.0.0
                  requirements:
                    - file: package.json
                      groups:
                        - dependencies
                      requirement: 10.2.1
                      source:
                        type: registry
                        url: https://registry.npmjs.org
                  version: 10.2.1
                  directory: /npm/maintainer-spaces
            updated-dependency-files:
