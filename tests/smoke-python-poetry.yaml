            pr-title: Bump numpy from 1.23.0 to 2.2.6 in /poetry
            pr-body: "Bumps [numpy](https://github.com/numpy/numpy) from 1.23.0 to 2.2.6.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/numpy/numpy/releases\">numpy's releases</a>.</em></p>\n<blockquote>\n<h2>v2.2.6 (May 17, 2025)</h2>\n<h1>NumPy 2.2.6 Release Notes</h1>\n<p>NumPy 2.2.6 is a patch release that fixes bugs found after the 2.2.5\nrelease. It is a mix of typing fixes/improvements as well as the normal\nbug fixes and some CI maintenance.</p>\n<p>This release supports Python versions 3.10-3.13.</p>\n<h2>Contributors</h2>\n<p>A total of 8 people contributed to this release. People with a &quot;+&quot; by\ntheir names contributed a patch for the first time.</p>\n<ul>\n<li>Charles Harris</li>\n<li>Ilhan Polat</li>\n<li>Joren Hammudoglu</li>\n<li>Marco Gorelli +</li>\n<li>Matti Picus</li>\n<li>Nathan Goldbaum</li>\n<li>Peter Hawkins</li>\n<li>Sayed Adel</li>\n</ul>\n<h2>Pull requests merged</h2>\n<p>A total of 11 pull requests were merged for this release.</p>\n<ul>\n<li><a href=\"https://redirect.github.com/numpy/numpy/pull/28778\">#28778</a>: MAINT: Prepare 2.2.x for further development</li>\n<li><a href=\"https://redirect.github.com/numpy/numpy/pull/28851\">#28851</a>: BLD: Update vendor-meson to fix module_feature conflicts arguments...</li>\n<li><a href=\"https://redirect.github.com/numpy/numpy/pull/28852\">#28852</a>: BUG: fix heap buffer overflow in np.strings.find</li>\n<li><a href=\"https://redirect.github.com/numpy/numpy/pull/28853\">#28853</a>: TYP: fix <code>NDArray[floating] + float</code> return type</li>\n<li><a href=\"https://redirect.github.com/numpy/numpy/pull/28864\">#28864</a>: BUG: fix stringdtype singleton thread safety</li>\n<li><a href=\"https://redirect.github.com/numpy/numpy/pull/28865\">#28865</a>: MAINT: use OpenBLAS 0.3.29</li>\n<li><a href=\"https://redirect.github.com/numpy/numpy/pull/28889\">#28889</a>: MAINT: from_dlpack thread safety fixes</li>\n<li><a href=\"https://redirect.github.com/numpy/numpy/pull/28913\">#28913</a>: TYP: Fix non-existent <code>CanIndex</code> annotation in <code>ndarray.setfield</code></li>\n<li><a href=\"https://redirect.github.com/numpy/numpy/pull/28915\">#28915</a>: MAINT: Avoid dereferencing/strict aliasing warnings</li>\n<li><a href=\"https://redirect.github.com/numpy/numpy/pull/28916\">#28916</a>: BUG: Fix missing check for PyErr_Occurred() in _pyarray_correlate.</li>\n<li><a href=\"https://redirect.github.com/numpy/numpy/pull/28966\">#28966</a>: TYP: reject complex scalar types in ndarray.__ifloordiv__</li>\n</ul>\n<h2>Checksums</h2>\n<h3>MD5</h3>\n<pre><code>259343f056061f6eadb2f4b8999d06d4  numpy-2.2.6-cp310-cp310-macosx_10_9_x86_64.whl\r\n16fa85488e149489ce7ee044d7b0d307  numpy-2.2.6-cp310-cp310-macosx_11_0_arm64.whl\r\nf01b7aea9d2b76b1eeb49766e615d689  numpy-2.2.6-cp310-cp310-macosx_14_0_arm64.whl\r\nf2ddc2b22517f6e31caa1372b12c2499  numpy-2.2.6-cp310-cp310-macosx_14_0_x86_64.whl\r\n52190e22869884f0870eb3df7a283ca9  numpy-2.2.6-cp310-cp310-manylinux_2_17_aarch64.manylinux2014_aarch64.whl\r\n8f382b9ca6770db600edd5ea2447a925  numpy-2.2.6-cp310-cp310-manylinux_2_17_x86_64.manylinux2014_x86_64.whl\r\ne604aae2ef6e01fb92ecc39aca0424d9  numpy-2.2.6-cp310-cp310-musllinux_1_2_aarch64.whl\n</code></pre>\n<!-- raw HTML omitted -->\n</blockquote>\n<p>... (truncated)</p>\n</details>\n<details>\n<summary>Commits</summary>\n<ul>\n<li><a href=\"https://github.com/numpy/numpy/commit/2b686f659642080e2fc708719385de6e8be0955f\"><code>2b686f6</code></a> Merge pull request <a href=\"https://redirect.github.com/numpy/numpy/issues/28980\">#28980</a> from charris/prepare-2.2.6</li>\n<li><a href=\"https://github.com/numpy/numpy/commit/ed418286bf91434d6f8af7133645de7b4ea3f807\"><code>ed41828</code></a> REL: Prepare for the NumPy 2.2.6 release [wheel build]</li>\n<li><a href=\"https://github.com/numpy/numpy/commit/83e4e7f87101e1bdc5976b686d89331e28fc77e9\"><code>83e4e7f</code></a> Merge pull request <a href=\"https://redirect.github.com/numpy/numpy/issues/28966\">#28966</a> from charris/backport-28958</li>\n<li><a href=\"https://github.com/numpy/numpy/commit/248f0cba3bd4081bde896009b1f10e975a608eaa\"><code>248f0cb</code></a> TYP: add rejection-tests for complex <code>ndarray</code> floordiv</li>\n<li><a href=\"https://github.com/numpy/numpy/commit/5bad9dabb3b875922ffe74e6909986cf89a46a7c\"><code>5bad9da</code></a> TYP: reject complex scalar types in <code>ndarray.__ifloordiv__</code></li>\n<li><a href=\"https://github.com/numpy/numpy/commit/6c4277507121547f4b3f704797c7aecdae8c2273\"><code>6c42775</code></a> Merge pull request <a href=\"https://redirect.github.com/numpy/numpy/issues/28915\">#28915</a> from charris/backport-28892</li>\n<li><a href=\"https://github.com/numpy/numpy/commit/4277e7cb1e9fe48c43b47adde6d2d5268b584584\"><code>4277e7c</code></a> Merge pull request <a href=\"https://redirect.github.com/numpy/numpy/issues/28916\">#28916</a> from charris/backport-28898</li>\n<li><a href=\"https://github.com/numpy/numpy/commit/bd1c863f4a17ef29a2b16f64af0b9eb4c4d2edde\"><code>bd1c863</code></a> BUG: Fix missing check for PyErr_Occurred() in _pyarray_correlate. (<a href=\"https://redirect.github.com/numpy/numpy/issues/28898\">#28898</a>)</li>\n<li><a href=\"https://github.com/numpy/numpy/commit/87d1d8a0dc43b240a2c5607b524940114f660b6f\"><code>87d1d8a</code></a> MAINT: Avoid dereferencing/strict aliasing warnings during complex casts in `...</li>\n<li><a href=\"https://github.com/numpy/numpy/commit/9e506595b1b49bdc1459937d95903f56e0514fe7\"><code>9e50659</code></a> Merge pull request <a href=\"https://redirect.github.com/numpy/numpy/issues/28913\">#28913</a> from charris/backport-28908</li>\n<li>Additional commits viewable in <a href=\"https://github.com/numpy/numpy/compare/v1.23.0...v2.2.6\">compare view</a></li>\n</ul>\n</details>\n<br />\n"
            commit-message: |-
                Bump numpy from 1.23.0 to 2.2.6 in /poetry

                Bumps [numpy](https://github.com/numpy/numpy) from 1.23.0 to 2.2.6.
                - [Release notes](https://github.com/numpy/numpy/releases)
                - [Changelog](https://github.com/numpy/numpy/blob/main/doc/RELEASE_WALKTHROUGH.rst)
                - [Commits](https://github.com/numpy/numpy/compare/v1.23.0...v2.2.6)
