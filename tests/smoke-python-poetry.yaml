input:
    job:
        command: update
        package-manager: pip
        allowed-updates:
            - update-type: all
        ignore-conditions:
            - dependency-name: toml
              source: tests/smoke-poetry.yaml
              version-requirement: '>0.10.2'
            - dependency-name: pyyaml
              source: tests/smoke-poetry.yaml
              version-requirement: '>6.0.3'
            - dependency-name: numpy
              source: tests/smoke-python-poetry.yaml
              version-requirement: '>2.2.6'
            - dependency-name: requests
              source: tests/smoke-python-poetry.yaml
              version-requirement: '>2.32.3'
        source:
            provider: github
            repo: dependabot/smoke-tests
            directory: /poetry
            commit: 0962713db3cb346a729e68bc86706ac7372f9067
    credentials:
        - host: github.com
          password: $LOCAL_GITHUB_ACCESS_TOKEN
          type: git_source
          username: x-access-token
output:
    - type: update_dependency_list
      expect:
        data:
            dependencies:
                - name: toml
                  requirements:
                    - file: pyproject.toml
                      groups:
                        - dependencies
                      requirement: 0.10.0
                      source: null
                  version: 0.10.0
                - name: pyyaml
                  requirements:
                    - file: pyproject.toml
                      groups:
                        - dependencies
                      requirement: ^6.0
                      source: null
                  version: "6.0"
                - name: numpy
                  requirements:
                    - file: pyproject.toml
                      groups:
                        - dependencies
                      requirement: 1.23.0
                      source: null
                  version: 1.23.0
                - name: requests
                  requirements:
                    - file: pyproject.toml
                      groups:
                        - dependencies
                      requirement: 2.28.0
                      source: null
                  version: null
            dependency_files:
                - /poetry/pyproject.toml
                - /poetry/poetry.lock
    - type: create_pull_request
      expect:
        data:
            base-commit-sha: 0962713db3cb346a729e68bc86706ac7372f9067
            dependencies:
