            pr-title: Bump pyyaml from 6.0 to 6.0.3 in /poetry
            pr-body: |
                Bumps [pyyaml](https://github.com/yaml/pyyaml) from 6.0 to 6.0.3.
                <details>
                <summary>Release notes</summary>
                <p><em>Sourced from <a href="https://github.com/yaml/pyyaml/releases">pyyaml's releases</a>.</em></p>
                <blockquote>
                <h2>6.0.3</h2>
                <h2>What's Changed</h2>
                <ul>
                <li>Support for Python 3.14 and free-threading (experimental).</li>
                </ul>
                <p><strong>Full Changelog</strong>: <a href="https://github.com/yaml/pyyaml/compare/6.0.2...6.0.3">https://github.com/yaml/pyyaml/compare/6.0.2...6.0.3</a></p>
                <h2>6.0.2</h2>
                <h2>What's Changed</h2>
                <ul>
                <li>Support for Cython 3.x and Python 3.13.</li>
                </ul>
                <p><strong>Full Changelog</strong>: <a href="https://github.com/yaml/pyyaml/compare/6.0.1...6.0.2">https://github.com/yaml/pyyaml/compare/6.0.1...6.0.2</a></p>
                <h2>6.0.2rc1</h2>
                <ul>
                <li>Support for extension build with Cython 3.x</li>
                <li>Support for Python 3.13</li>
                <li>Added PyPI wheels for musllinux on aarch64</li>
                </ul>
                </blockquote>
                </details>
                <details>
                <summary>Changelog</summary>
                <p><em>Sourced from <a href="https://github.com/yaml/pyyaml/blob/6.0.3/CHANGES">pyyaml's changelog</a>.</em></p>
                <blockquote>
                <p>6.0.3 (2025-09-25)</p>
                <ul>
                <li><a href="https://redirect.github.com/yaml/pyyaml/pull/864">yaml/pyyaml#864</a> -- Support for Python 3.14 and free-threading (experimental)</li>
                </ul>
                <p>6.0.2 (2024-08-06)</p>
                <ul>
                <li><a href="https://redirect.github.com/yaml/pyyaml/pull/808">yaml/pyyaml#808</a> -- Support for Cython 3.x and Python 3.13</li>
                </ul>
                <p>6.0.1 (2023-07-18)</p>
                <ul>
                <li><a href="https://redirect.github.com/yaml/pyyaml/pull/702">yaml/pyyaml#702</a> -- pin Cython build dep to &lt; 3.0</li>
                </ul>
                </blockquote>
                </details>
                <details>
                <summary>Commits</summary>
                <ul>
                <li><a href="https://github.com/yaml/pyyaml/commit/49790e73684bebad1df05ef8d828fa12f685bffb"><code>49790e7</code></a> Release 6.0.3 (<a href="https://redirect.github.com/yaml/pyyaml/issues/889">#889</a>)</li>
                <li><a href="https://github.com/yaml/pyyaml/commit/41309b0bcb4559edb1d691d47199035ef539d785"><code>41309b0</code></a> Release 6.0.2 (<a href="https://redirect.github.com/yaml/pyyaml/issues/819">#819</a>)</li>
                <li><a href="https://github.com/yaml/pyyaml/commit/dd9f0e1236775dcce682c91823e009556ce2a271"><code>dd9f0e1</code></a> 6.0.2rc1 (<a href="https://redirect.github.com/yaml/pyyaml/issues/809">#809</a>)</li>
                <li><a href="https://github.com/yaml/pyyaml/commit/f5527a26d518b3e9c66f9211e0af00c83f09a97e"><code>f5527a2</code></a> disable CI trigger on PR edits</li>
                <li><a href="https://github.com/yaml/pyyaml/commit/b4d80a742142004490d2da7691d534923820b81c"><code>b4d80a7</code></a> Python 3.12 + musllinux_1_1_x86_64 wheel support</li>
                <li><a href="https://github.com/yaml/pyyaml/commit/c42fa3bff1eabdb64763bb1526d9ea1ccb708479"><code>c42fa3b</code></a> 6.0.1 release</li>
                <li><a href="https://github.com/yaml/pyyaml/commit/ae08bdc82b4ddfcd2b93c8aedcd1963766c3307d"><code>ae08bdc</code></a> block Cython 3.0+ as a build dep (<a href="https://redirect.github.com/yaml/pyyaml/issues/702">#702</a>)</li>
                <li><a href="https://github.com/yaml/pyyaml/commit/f873cfef316290c7cb5351b7e77a8d69d48d4f7d"><code>f873cfe</code></a> Add python 3.11 support (<a href="https://redirect.github.com/yaml/pyyaml/issues/663">#663</a>)</li>
                <li>See full diff in <a href="https://github.com/yaml/pyyaml/compare/6.0...6.0.3">compare view</a></li>
                </ul>
                </details>
                <br />
            commit-message: |-
                Bump pyyaml from 6.0 to 6.0.3 in /poetry

                Bumps [pyyaml](https://github.com/yaml/pyyaml) from 6.0 to 6.0.3.
                - [Release notes](https://github.com/yaml/pyyaml/releases)
                - [Changelog](https://github.com/yaml/pyyaml/blob/6.0.3/CHANGES)
                - [Commits](https://github.com/yaml/pyyaml/compare/6.0...6.0.3)
