            pr-title: Bump toml from 0.10.0 to 0.10.2 in /poetry
            pr-body: |
                Bumps [toml](https://github.com/uiri/toml) from 0.10.0 to 0.10.2.
                <details>
                <summary>Commits</summary>
                <ul>
                <li><a href="https://github.com/uiri/toml/commit/3f637dba5f68db63d4b30967fedda51c82459471"><code>3f637db</code></a> Bump version to 0.10.2 (<a href="https://redirect.github.com/uiri/toml/issues/333">#333</a>)</li>
                <li><a href="https://github.com/uiri/toml/commit/9a85ffe981d659a43d321694ecbd42fe96caed7d"><code>9a85ffe</code></a> Update PYI files (<a href="https://redirect.github.com/uiri/toml/issues/332">#332</a>)</li>
                <li><a href="https://github.com/uiri/toml/commit/2846c42e85f56090da815455a1cb307ed6d6acb1"><code>2846c42</code></a> Update README.rst (<a href="https://redirect.github.com/uiri/toml/issues/329">#329</a>)</li>
                <li><a href="https://github.com/uiri/toml/commit/230f0c9cffd230354759949dd1dd89acd3dddb80"><code>230f0c9</code></a> Fix <a href="https://redirect.github.com/uiri/toml/issues/287">#287</a>: Broken quoted section name starts with dot (<a href="https://redirect.github.com/uiri/toml/issues/330">#330</a>)</li>
                <li><a href="https://github.com/uiri/toml/commit/3a034ece79f04b0ab2091ba4d6475c4272969b6d"><code>3a034ec</code></a> feat: Add official support for Python 3.9. (<a href="https://redirect.github.com/uiri/toml/issues/325">#325</a>)</li>
                <li><a href="https://github.com/uiri/toml/commit/38a9685cce3b866aad0f1e6edac9888b3725c92d"><code>38a9685</code></a> show meaningful error message for wrong case booleans (<a href="https://redirect.github.com/uiri/toml/issues/315">#315</a>)</li>
                <li><a href="https://github.com/uiri/toml/commit/16a64414653979927e50a9ebb86deebfce7b0f95"><code>16a6441</code></a> Add <strong>deepcopy</strong> method to TomlTz class. Fix <a href="https://redirect.github.com/uiri/toml/issues/308">#308</a> (<a href="https://redirect.github.com/uiri/toml/issues/309">#309</a>)</li>
                <li><a href="https://github.com/uiri/toml/commit/9be64582fff86b9c5bd94ce52a5fedcb3d4fac01"><code>9be6458</code></a> ids were based on the string, rather than the actual object which causes inco...</li>
                <li><a href="https://github.com/uiri/toml/commit/a952ed805d5931c21df3f33a25733d4f0a37b95a"><code>a952ed8</code></a> Skip numpy tests when numpy is not available (<a href="https://redirect.github.com/uiri/toml/issues/298">#298</a>)</li>
                <li><a href="https://github.com/uiri/toml/commit/4c246bbf8ac56d1e87f2b8ad7280cbb2f9f07e68"><code>4c246bb</code></a> added toml.dump example to Quick Tutorial (<a href="https://redirect.github.com/uiri/toml/issues/301">#301</a>)</li>
                <li>Additional commits viewable in <a href="https://github.com/uiri/toml/compare/0.10.0...0.10.2">compare view</a></li>
                </ul>
                </details>
                <br />
            commit-message: |-
