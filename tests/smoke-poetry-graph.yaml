input:
    job:
        command: update
        package-manager: pip
        allowed-updates:
            - update-type: all
        ignore-conditions:
            - dependency-name: requests
              source: tests/smoke-poetry-graph.yaml
              version-requirement: '>2.32.5'
            - dependency-name: flask
              source: tests/smoke-poetry-graph.yaml
              version-requirement: '>3.1.3'
        source:
            provider: github
            repo: dependabot/smoke-tests
            directories:
                - /poetry-graph
            commit: 201501c8f5fdcb64a33694c7c9f8d8d997b1e5e1
            hostname: github.com
            api-endpoint: https://api.github.com
    credentials:
        - host: github.com
          password: $LOCAL_GITHUB_ACCESS_TOKEN
          type: git_source
          username: x-access-token
output:
    - type: update_dependency_list
      expect:
        data:
            dependencies:
                - name: requests
                  requirements:
