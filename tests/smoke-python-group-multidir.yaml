input:
    job:
        command: update
        package-manager: pip
        allowed-updates:
            - dependency-type: direct
              update-type: all
        dependency-groups:
            - name: pip
              applies-to: security-updates
              rules:
                patterns:
                    - '*'
        dependencies:
            - urllib3
            - numpy
            - Flask
        ignore-conditions:
            - dependency-name: django
              source: tests/smoke-pip.yaml
              version-requirement: '>4.0.6'
        security-advisories:
            - dependency-name: Flask
              affected-versions:
                - <= 2.0.0
              patched-versions: []
              unaffected-versions: []
            - dependency-name: numpy
              affected-versions:
                - <= 1.0.0
              patched-versions: []
              unaffected-versions: []
            - dependency-name: urllib3
              affected-versions:
                - <= 1.0.0
              patched-versions: []
              unaffected-versions: []
        security-updates-only: true
        source:
            provider: github
            repo: dependabot/smoke-tests
            directories:
                - /pip/multi-dir/foo
                - /pip/multi-dir/bar
            commit: 0962713db3cb346a729e68bc86706ac7372f9067
    credentials:
        - host: github.com
          password: $LOCAL_GITHUB_ACCESS_TOKEN
          type: git_source
          username: x-access-token
output:
    - type: update_dependency_list
      expect:
        data:
            dependencies:
                - name: urllib3
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.0
                      source: null
                  version: "1.0"
                - name: flask[async]
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==2.0.0
                      source: null
                  version: 2.0.0
                - name: urllib3[socks]
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.0
                      source: null
                  version: "1.0"
                - name: numpy
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.0
                      source: null
                  version: "1.0"
            dependency_files:
                - /pip/multi-dir/foo/requirements.txt
                - /pip/multi-dir/bar/requirements.txt
    - type: create_pull_request
      expect:
        data:
            base-commit-sha: 0962713db3cb346a729e68bc86706ac7372f9067
            dependencies:
                - name: urllib3
                  previous-requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.0
                      source: null
                  previous-version: "1.0"
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.0.1
                      source: null
                  version: 1.0.1
                  directory: /pip/multi-dir/foo
                - name: numpy
                  previous-requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.0
                      source: null
                  previous-version: "1.0"
                  requirements:
                    - file: requirements.txt
                      groups:
                        - dependencies
                      requirement: ==1.3.0
                      source: null
                  version: 1.3.0
                  directory: /pip/multi-dir/bar
            updated-dependency-files:
                - content: |
                    urllib3==1.0.1
                    Flask[async]==2.0.0
                  content_encoding: utf-8
                  deleted: false
                  directory: /pip/multi-dir/foo
                  name: requirements.txt
                  operation: update
                  support_file: false
                  type: file
                - content: |
                    urllib3[socks]==1.0
                    numpy==1.3.0
                  content_encoding: utf-8
                  deleted: false
                  directory: /pip/multi-dir/bar
                  name: requirements.txt
                  operation: update
                  support_file: false
                  type: file
            pr-title: bump the pip group across 2 directories with 2 updates
            commit-message: bump the pip group across 2 directories with 2 updates
            dependency-group:
                name: pip
    - type: mark_as_processed
      expect:
        data:
            base-commit-sha: 0962713db3cb346a729e68bc86706ac7372f9067
