        command: update
        package-manager: github_actions
        allowed-updates:
            - dependency-name: actions/setup-python
            - dependency-name: actions/setup-ruby
            - dependency-name: actions/setup-node
        dependency-groups:
            - name: setup
              rules:
                patterns:
                    - actions/setup-node
                    - actions/setup-ruby
        experiments:
            grouped-updates-prototype: true
            record-ecosystem-versions: true
        ignore-conditions:
            - dependency-name: actions/setup-node
              source: tests/smoke-actions.yaml
              version-requirement: '>2.0.0'
            - dependency-name: actions/setup-ruby
              source: tests/smoke-actions.yaml
              version-requirement: '>1.1.3'
            - dependency-name: actions/setup-python
              source: tests/smoke-actions.yaml
              version-requirement: '>6.2.0'
        source:
            provider: github
            repo: dependabot/smoke-tests
            directory: /.
            commit: caa72918c699114c49d47a7271c2c420cc04388c
    credentials:
        - host: github.com
          password: $LOCAL_GITHUB_ACCESS_TOKEN
          type: git_source
          username: x-access-token
