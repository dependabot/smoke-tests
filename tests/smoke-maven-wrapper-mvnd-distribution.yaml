                - /maven-wrapper/mvnd-distribution/mvnw
                - /maven-wrapper/mvnd-distribution/mvnw.cmd
    - type: mark_as_processed
      expect:
        data:
            base-commit-sha: 49b5d7b864f085ff0249e6fa19573604319f3e1a
