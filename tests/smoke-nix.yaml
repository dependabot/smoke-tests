input:
    job:
        command: update
        package-manager: nix
        allowed-updates:
            - update-type: all
        experiments:
            enable_beta_ecosystems: true
        ignore-conditions:
            - dependency-name: flake-utils
              source: result-nix.yaml
              version-requirement: '>11707dc2f618dd54ca8739b309ec4fc024de578b'
        source:
            provider: github
            repo: dependabot/smoke-tests
            directory: /nix
            commit: b23be6858f96a0d210331ef540f7c184d41a2ba8
    credentials:
        - host: github.com
          password: $LOCAL_GITHUB_ACCESS_TOKEN
          type: git_source
          username: x-access-token
output:
    - type: update_dependency_list
      expect:
        data:
            dependencies:
                - name: flake-utils
                  requirements:
                    - file: flake.lock
                      groups: []
                      requirement: null
                      source:
                        branch: null
                        ref: null
                        type: git
                        url: https://github.com/numtide/flake-utils
                  version: c1dfcf08411b08f6b8615f7d8971a2bfa81d5e8a
            dependency_files:
                - /nix/flake.nix
                - /nix/flake.lock
    - type: record_update_job_error
      expect:
        data:
            error-type: unknown_error
            error-details: {}
    - type: mark_as_processed
      expect:
        data:
            base-commit-sha: b23be6858f96a0d210331ef540f7c184d41a2ba8
