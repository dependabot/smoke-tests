            pr-title: Bump org.scala-sbt:sbt from 1.9.7 to 1.12.11 in /sbt
            pr-body: "Bumps [org.scala-sbt:sbt](https://github.com/sbt/sbt) from 1.9.7 to 1.12.11.\n<details>\n<summary>Release notes</summary>\n<p><em>Sourced from <a href=\"https://github.com/sbt/sbt/releases\">org.scala-sbt:sbt's releases</a>.</em></p>\n<blockquote>\n<h2>1.12.11</h2>\n<h2>bug fix</h2>\n<ul>\n<li>fix: Rollback eviction error in <code>Test</code> by <a href=\"https://github.com/eed3si9n\"><code>@​eed3si9n</code></a> in <a href=\"https://redirect.github.com/sbt/librarymanagement/pull/600\">sbt/librarymanagement#600</a></li>\n</ul>\n<p><strong>Full Changelog</strong>: <a href=\"https://github.com/sbt/sbt/compare/v1.12.10...v1.12.11\">https://github.com/sbt/sbt/compare/v1.12.10...v1.12.11</a></p>\n<h2>1.12.10</h2>\n<h2>updates</h2>\n<ul>\n<li>deps: Update log4j to 2.25.4, which fixes CVE-2026-34477, CVE-2026-34478, CVE-2026-34479, CVE-2026-34480 by <a href=\"https://github.com/dancewithheart\"><code>@​dancewithheart</code></a> in <a href=\"https://redirect.github.com/sbt/sbt/pull/9086\">sbt/sbt#9086</a></li>\n<li>deps: Update Gigahorse to 0.9.4, which pulls in httpclient5 5.6.1 by <a href=\"https://github.com/eed3si9n\"><code>@​eed3si9n</code></a> in <a href=\"https://redirect.github.com/sbt/sbt/pull/9125\">sbt/sbt#9125</a></li>\n<li>deps: Update sbtn to 2.0.0-RC13 by <a href=\"https://github.com/eed3si9n\"><code>@​eed3si9n</code></a> in <a href=\"https://redirect.github.com/sbt/sbt/pull/9139\">sbt/sbt#9139</a></li>\n<li>Backport of eviction error in <code>Test</code> configuration by <a href=\"https://github.com/zainab-ali\"><code>@​zainab-ali</code></a> in <a href=\"https://redirect.github.com/sbt/sbt/pull/9102\">sbt/sbt#9102</a></li>\n</ul>\n<h2>\U0001F41B bug fixes</h2>\n<ul>\n<li>fix: Hide JDK warnings if JDK 26 or later by <a href=\"https://github.com/xuwei-k\"><code>@​xuwei-k</code></a> in <a href=\"https://redirect.github.com/sbt/sbt/pull/9068\">sbt/sbt#9068</a></li>\n<li>fix: Fixes managedScalaInstance false support by <a href=\"https://github.com/eed3si9n\"><code>@​eed3si9n</code></a> in <a href=\"https://redirect.github.com/sbt/sbt/pull/9121\">sbt/sbt#9121</a></li>\n</ul>\n<h2>behind the scenes</h2>\n<ul>\n<li>ci: dependency-submission branch set to 1.12.x by <a href=\"https://github.com/dancewithheart\"><code>@​dancewithheart</code></a> in <a href=\"https://redirect.github.com/sbt/sbt/pull/9088\">sbt/sbt#9088</a></li>\n</ul>\n<h2>new contributors</h2>\n<ul>\n<li><a href=\"https://github.com/dancewithheart\"><code>@​dancewithheart</code></a> made their first contribution in <a href=\"https://redirect.github.com/sbt/sbt/pull/9086\">sbt/sbt#9086</a></li>\n</ul>\n<p><strong>Full Changelog</strong>: <a href=\"https://github.com/sbt/sbt/compare/v1.12.9...v1.12.10\">https://github.com/sbt/sbt/compare/v1.12.9...v1.12.10</a></p>\n<h2>1.12.9</h2>\n<h2>Updates</h2>\n<ul>\n<li>fix: Prefer local ScalaModuleInfo over global config by <a href=\"https://github.com/kitbellew\"><code>@​kitbellew</code></a> in <a href=\"https://redirect.github.com/coursier/sbt-coursier/pull/609\">coursier/sbt-coursier#609</a></li>\n</ul>\n<p><strong>Full Changelog</strong>: <a href=\"https://github.com/sbt/sbt/compare/v1.12.8...v1.12.9\">https://github.com/sbt/sbt/compare/v1.12.8...v1.12.9</a></p>\n<h2>1.12.8</h2>\n<h2>updates</h2>\n<ul>\n<li>fix: Fixes the source dependency checkout directory by <a href=\"https://github.com/eed3si9n\"><code>@​eed3si9n</code></a> in <a href=\"https://redirect.github.com/sbt/sbt/pull/8974\">sbt/sbt#8974</a></li>\n</ul>\n<h2>behind the scenes</h2>\n<ul>\n<li>fix: Fixes test format by <a href=\"https://github.com/eed3si9n\"><code>@​eed3si9n</code></a> in <a href=\"https://redirect.github.com/sbt/sbt/pull/8969\">sbt/sbt#8969</a></li>\n</ul>\n<p><strong>Full Changelog</strong>: <a href=\"https://github.com/sbt/sbt/compare/v1.12.7...v1.12.8\">https://github.com/sbt/sbt/compare/v1.12.7...v1.12.8</a></p>\n<h2>1.12.7</h2>\n<h3>CVE-2026-32948 Source dependency feature (via crafted VCS URL) leading to arbitrary code execution on Windows</h3>\n<p>sbt 1.12.7 fixes CVE-2026-32948 (<a href=\"https://github.com/sbt/sbt/security/advisories/GHSA-x4ff-q6h8-v7gw\">https://github.com/sbt/sbt/security/advisories/GHSA-x4ff-q6h8-v7gw</a>). Recently <a href=\"https://github.com/anatoliykmetyuk\"><code>@​anatoliykmetyuk</code></a> at Scala Center discovered a vulnerability in sbt's source dependency feature <code>ProjectRef(...)</code> and <code>RootProject(...)</code>. The URL for the version control system allows branch specification via the URL fragment, which is passed to Windows <code>cmd</code> shell. A malicious user can craft an URL that allows arbitrary code execution.</p>\n<!-- raw HTML omitted -->\n</blockquote>\n<p>... (truncated)</p>\n</details>\n<details>\n<summary>Commits</summary>\n<ul>\n<li><a href=\"https://github.com/sbt/sbt/commit/f2d97b703e8262c81ac25472c231f13810822773\"><code>f2d97b7</code></a> sbt 1.12.11</li>\n<li><a href=\"https://github.com/sbt/sbt/commit/1843f386e6591c5535e80e8b915c4985e510796e\"><code>1843f38</code></a> [1.x] Bump to lm 1.12.2 (<a href=\"https://redirect.github.com/sbt/sbt/issues/9167\">#9167</a>)</li>\n<li><a href=\"https://github.com/sbt/sbt/commit/0f946cb961d2f786d68f8c8799831b84e0691cdd\"><code>0f946cb</code></a> sbt 1.12.10</li>\n<li><a href=\"https://github.com/sbt/sbt/commit/b41ca564f64f23a565dd7690c91e7d0206b82b48\"><code>b41ca56</code></a> [1.x] Bump sbtn to 2.0.0-RC13 (<a href=\"https://redirect.github.com/sbt/sbt/issues/9139\">#9139</a>)</li>\n<li><a href=\"https://github.com/sbt/sbt/commit/0a4bdae4649bf357e857ac791af883ed87de2a41\"><code>0a4bdae</code></a> Merge pull request <a href=\"https://redirect.github.com/sbt/sbt/issues/9128\">#9128</a> from eed3si9n/bport1/eviction-error</li>\n<li><a href=\"https://github.com/sbt/sbt/commit/62a20201de4fcfb8430f841b1a2c904e075e9989\"><code>62a2020</code></a> [1.x] Add Test configuration to evictionWarningOptions (<a href=\"https://redirect.github.com/sbt/sbt/issues/9102\">#9102</a>)</li>\n<li><a href=\"https://github.com/sbt/sbt/commit/6f1ce28dc12ee1f906c35e92bcbd6bfd895793b0\"><code>6f1ce28</code></a> lm 1.12.1</li>\n<li><a href=\"https://github.com/sbt/sbt/commit/764c9e13ba6d6ac8b60535393d6479f33c43cd0f\"><code>764c9e1</code></a> [1.x] deps: Gigahorse 0.9.4 (<a href=\"https://redirect.github.com/sbt/sbt/issues/9126\">#9126</a>)</li>\n<li><a href=\"https://github.com/sbt/sbt/commit/872db3d8172a94316616f7ce3b489c5017340ce6\"><code>872db3d</code></a> [1.x] fix: Fixes managedScalaInstance false support (<a href=\"https://redirect.github.com/sbt/sbt/issues/9121\">#9121</a>) (<a href=\"https://redirect.github.com/sbt/sbt/issues/9123\">#9123</a>)</li>\n<li><a href=\"https://github.com/sbt/sbt/commit/6723437f97ab2ca04210d8db2e1aa7d4cd4c40a9\"><code>6723437</code></a> [1.x] hide JDK warnings if JDK 26 or later (<a href=\"https://redirect.github.com/sbt/sbt/issues/9120\">#9120</a>)</li>\n<li>Additional commits viewable in <a href=\"https://github.com/sbt/sbt/compare/v1.9.7...v1.12.11\">compare view</a></li>\n</ul>\n</details>\n<br />\n"
