            pr-body: |
                Bumps [org.scala-lang:scala-library](https://github.com/scala/scala3) from 2.13.12 to 3.8.3.
                <details>
                <summary>Release notes</summary>
                <p><em>Sourced from <a href="https://github.com/scala/scala3/releases">org.scala-lang:scala-library's releases</a>.</em></p>
                <blockquote>
                <h2>3.8.3</h2>
                <h1>Release highlights</h1>
                <ul>
                <li>Add support for local coverage on and off with <code>// $COVERAGE-OFF$</code> and <code>// $COVERAGE-ON$</code> <a href="https://redirect.github.com/scala/scala3/pull/24486">#24486</a></li>
                <li>Deprecate for removal <code>-print-lines</code> compiler setting <a href="https://redirect.github.com/scala/scala3/pull/25330">#25330</a></li>
                <li>Add safe mode capture checking extension <a href="https://redirect.github.com/scala/scala3/pull/25307">#25307</a></li>
                <li>Port the Scala2 JVM backend optimizer <a href="https://redirect.github.com/scala/scala3/pull/25165">#25165</a></li>
                </ul>
                <h1>Other changes and fixes</h1>
                <h2>Desugaring</h2>
                <ul>
                <li>Fix <a href="https://redirect.github.com/scala/scala3/issues/24997">#24997</a>: Avoid unnecessary CHECKCAST in untupled function parameters <a href="https://redirect.github.com/scala/scala3/pull/25085">#25085</a></li>
                </ul>
                <h2>Documentation</h2>
                <ul>
                <li>Fix little errors in the API documentation <a href="https://redirect.github.com/scala/scala3/pull/25241">#25241</a></li>
                <li>CC Language Reference: Rename <code>cap</code> to <code>any/fresh</code> <a href="https://redirect.github.com/scala/scala3/pull/25057">#25057</a></li>
                </ul>
                <h2>Enums</h2>
                <ul>
                <li>Deprecate override class, improve checks <a href="https://redirect.github.com/scala/scala3/pull/24828">#24828</a></li>
                <li>Fix Java enum forwarders to pull from companion on initialization  <a href="https://redirect.github.com/scala/scala3/pull/24361">#24361</a></li>
                </ul>
                <h2>Experimental: Capture Checking</h2>
                <ul>
                <li>Rename caps.cap to caps.any <a href="https://redirect.github.com/scala/scala3/pull/24923">#24923</a></li>
                <li>Track global capabilities <a href="https://redirect.github.com/scala/scala3/pull/24883">#24883</a></li>
                <li>Treat local mutable vars as capabilities <a href="https://redirect.github.com/scala/scala3/pull/24815">#24815</a></li>
                <li>Fix Crashes when Capture-set Parameters Conflict with Terms <a href="https://redirect.github.com/scala/scala3/pull/25029">#25029</a></li>
                <li>Replace &quot;cannot be included in&quot; by &quot;cannot flow into&quot; in error messages <a href="https://redirect.github.com/scala/scala3/pull/25155">#25155</a></li>
                <li>CC: Add field captures to self-type constraints <a href="https://redirect.github.com/scala/scala3/pull/24984">#24984</a></li>
                <li>Add uses clauses for templates <a href="https://redirect.github.com/scala/scala3/pull/24857">#24857</a></li>
                <li>Drop special code paths for objects <a href="https://redirect.github.com/scala/scala3/pull/24881">#24881</a></li>
                <li>Do not consider generated getters to be <code>update def</code> <a href="https://redirect.github.com/scala/scala3/pull/24906">#24906</a></li>
